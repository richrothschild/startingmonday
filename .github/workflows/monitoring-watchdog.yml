name: Monitoring Watchdog

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  watchdog:
    name: Watch monitoring and alerting health
    runs-on: ubuntu-latest

    steps:
      - name: Validate required monitoring secrets
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          missing=0
          if [ -z "$CRON_SECRET" ]; then
            echo "Missing required secret: CRON_SECRET"
            missing=1
          fi
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "Missing required secret: SLACK_WEBHOOK_URL"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Check scheduled workflow freshness
        id: freshness
        uses: actions/github-script@v8
        with:
          script: |
            const workflows = [
              { id: 'ci.yml', name: 'CI', maxAgeMinutes: null, requireSuccess: false },
              { id: 'monitoring.yml', name: 'Production Monitoring', maxAgeMinutes: 90, requireSuccess: true },
              { id: 'deployment-watchdog.yml', name: 'Deployment Watchdog', maxAgeMinutes: 90, requireSuccess: true },
              { id: 'fast-burn-alert.yml', name: 'Fast-Burn Alert', maxAgeMinutes: 90, requireSuccess: true },
              { id: 'dependency-health.yml', name: 'Dependency Health', maxAgeMinutes: 90, requireSuccess: true },
              // Synthetics runs every 5 minutes, but GitHub scheduled workflows can drift significantly during incidents.
              // Use a wider threshold to prevent false watchdog pages while still detecting real monitoring stalls.
              { id: 'production-synthetics.yml', name: 'Production Synthetics', maxAgeMinutes: 120, requireSuccess: true },
              { id: 'security-weekly.yml', name: 'Weekly security audit', maxAgeMinutes: 60 * 24 * 10, requireSuccess: false },
              { id: 'watermark-audit.yml', name: 'Monthly Watermark Documentation Audit', maxAgeMinutes: 60 * 24 * 40, requireSuccess: false },
            ]

            const now = Date.now()
            const failures = []
            const notes = []

            for (const wf of workflows) {
              const res = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: wf.id,
                status: 'completed',
                per_page: 10,
                branch: 'main',
                exclude_pull_requests: true,
              })

              const runs = res.data.workflow_runs ?? []
              const latestRun = runs[0]

              if (!latestRun) {
                failures.push(`${wf.name}: no completed run found on main`)
                continue
              }

              const latestAgeMinutes = Math.floor((now - new Date(latestRun.created_at).getTime()) / 60000)

              if (wf.maxAgeMinutes !== null && latestAgeMinutes > wf.maxAgeMinutes) {
                failures.push(`${wf.name}: stale (${latestAgeMinutes}m > ${wf.maxAgeMinutes}m)`)
              }

              if (wf.requireSuccess) {
                const latestSuccess = runs.find((r) => r.conclusion === 'success')
                if (!latestSuccess) {
                  failures.push(`${wf.name}: no successful run found in recent history`)
                  notes.push(`${wf.name}: latest ${latestRun.conclusion} (${latestAgeMinutes}m old), no recent success`)
                  continue
                }

                const latestSuccessAgeMinutes = Math.floor((now - new Date(latestSuccess.created_at).getTime()) / 60000)
                notes.push(`${wf.name}: latest ${latestRun.conclusion} (${latestAgeMinutes}m old), latest success ${latestSuccessAgeMinutes}m old`)

                if (wf.maxAgeMinutes !== null && latestSuccessAgeMinutes > wf.maxAgeMinutes) {
                  failures.push(`${wf.name}: no successful run within freshness window (${latestSuccessAgeMinutes}m > ${wf.maxAgeMinutes}m)`)
                }
              } else {
                notes.push(`${wf.name}: ${latestRun.conclusion} (${latestAgeMinutes}m old)`)
              }
            }

            core.notice(notes.join(' | '))

            if (failures.length) {
              core.setOutput('summary', failures.join(' | '))
              core.setFailed(failures.join('\n'))
            } else {
              core.setOutput('summary', 'Monitoring watchdog checks passed')
            }

      - name: Send Slack alert on watchdog failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          SUMMARY='${{ steps.freshness.outputs.summary }}'
          if [ -z "$SUMMARY" ]; then
            SUMMARY='Monitoring watchdog failed before summary was generated.'
          fi
          curl -X POST -H 'Content-type: application/json' --data '{
            "text": "🚨 Monitoring watchdog failed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Monitoring watchdog failed*\n'"$SUMMARY"'\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View watchdog run>"
                }
              }
            ]
          }' "$SLACK_WEBHOOK_URL"
