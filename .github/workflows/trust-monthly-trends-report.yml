name: Trust Monthly Trends Report

on:
  schedule:
    - cron: '50 13 1 * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  trust-monthly-report:
    name: Build trust monthly trends report
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate trust monthly trends report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_RELIABILITY_SERVICE_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RELIABILITY_SLACK_CHANNEL: reliability---service
        run: node scripts/trust-monthly-trends-report.mjs

      - name: Upload trust monthly report artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: trust-monthly-latest
          path: |
            docs/status/trust-monthly.latest.json
            docs/status/trust-monthly.latest.md
          retention-days: 14

      - name: Alert when trust monthly report fails
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "No Slack webhook configured; skipping failure alert."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -X POST -H 'Content-type: application/json' --data '{
            "text": "🚨 Trust monthly trends report failed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Trust monthly trends report failed*\nChannel: reliability---service\n<'"$RUN_URL"'|View workflow run>"
                }
              }
            ]
          }' "$SLACK_WEBHOOK_URL"
