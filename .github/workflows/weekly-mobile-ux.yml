name: Weekly Mobile UX Audit

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

jobs:
  mobile-ux-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
      PLAYWRIGHT_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
      PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}
      PLAYWRIGHT_NONSTAFF_EMAIL: ${{ secrets.PLAYWRIGHT_NONSTAFF_EMAIL }}
      PLAYWRIGHT_NONSTAFF_PASSWORD: ${{ secrets.PLAYWRIGHT_NONSTAFF_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run mobile UX contract and banned-pattern guard
        run: npm run mobile:guard

      - name: Run mobile UX sweep
        run: npm run test:e2e:mobile-sweep

      - name: Run mobile visual regression
        run: npm run test:e2e:mobile-visual

      - name: Run elite mobile visual regression
        run: npm run test:e2e:mobile-elite-visual

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: weekly-mobile-ux-playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload mobile route coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: weekly-mobile-route-coverage
          path: |
            playwright-report/mobile-key-routes.json
            playwright-report/mobile-key-routes-coverage.md
          retention-days: 14
