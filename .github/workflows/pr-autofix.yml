name: PR Autofix

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number"
        required: true
        type: string
      target:
        description: "Autofix target"
        required: true
        type: choice
        options:
          - mobile-visual
          - elite-visual

permissions:
  contents: write
  pull-requests: write
  checks: read
  issues: write

concurrency:
  group: pr-autofix-${{ github.repository }}-${{ github.event.issue.number || github.event.pull_request.number || github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: false

jobs:
  detect:
    name: Detect and authorize autofix target
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.detect.outputs.run }}
      reason: ${{ steps.detect.outputs.reason }}
      pr_number: ${{ steps.detect.outputs.pr_number }}
      head_ref: ${{ steps.detect.outputs.head_ref }}
      head_sha: ${{ steps.detect.outputs.head_sha }}
      target: ${{ steps.detect.outputs.target }}
    steps:
      - name: Detect trigger context
        id: detect
        uses: actions/github-script@v8
        with:
          script: |
            const eventName = context.eventName
            const owner = context.repo.owner
            const repo = context.repo.repo

            const setOut = (k, v) => core.setOutput(k, String(v ?? ''))
            const stop = (reason) => {
              setOut('run', 'false')
              setOut('reason', reason)
              return
            }

            let prNumber
            let target

            if (eventName === 'workflow_dispatch') {
              prNumber = Number(context.payload.inputs?.pr_number)
              target = context.payload.inputs?.target
              if (!prNumber || !target) return stop('Missing workflow_dispatch inputs')
            }

            if (eventName === 'issue_comment') {
              const body = (context.payload.comment?.body || '').trim()
              const isPrComment = Boolean(context.payload.issue?.pull_request)
              if (!isPrComment) return stop('Comment is not on a pull request')

              const assoc = context.payload.comment?.author_association || 'NONE'
              const allowedAssoc = new Set(['OWNER', 'MEMBER', 'COLLABORATOR'])
              if (!allowedAssoc.has(assoc)) return stop(`User association not allowed: ${assoc}`)

              const match = body.match(/^\/autofix\s+(mobile-visual|elite-visual)\s*$/i)
              if (!match) return stop('No supported /autofix command found')

              prNumber = Number(context.payload.issue.number)
              target = match[1].toLowerCase()
            }

            if (eventName === 'pull_request_target') {
              const label = context.payload.label?.name || ''
              const mapping = {
                'autofix:mobile-visual': 'mobile-visual',
                'autofix:elite-visual': 'elite-visual',
              }
              target = mapping[label]
              if (!target) return stop(`Label not mapped: ${label}`)
              prNumber = Number(context.payload.pull_request?.number)
            }

            if (!prNumber || !target) return stop('Failed to determine PR number or target')

            const pr = await github.rest.pulls.get({ owner, repo, pull_number: prNumber })

            if (pr.data.state !== 'open') return stop('PR is not open')
            if (pr.data.head.repo?.full_name !== `${owner}/${repo}`) {
              return stop('Refusing to push to fork PR head branch')
            }

            const prLabels = (pr.data.labels ?? []).map((label) => label.name)
            const blockedLabels = new Set(['risk:high', 'autofix:blocked'])
            if (prLabels.some((label) => blockedLabels.has(label))) {
              return stop('Autofix blocked by PR risk labels (risk:high or autofix:blocked)')
            }

            const requiresApprovalLabel = target === 'mobile-visual' || target === 'elite-visual'
            if (requiresApprovalLabel && !prLabels.includes('autofix:approved') && eventName !== 'workflow_dispatch') {
              return stop('Visual autofix requires autofix:approved label')
            }

            const checks = await github.rest.checks.listForRef({
              owner,
              repo,
              ref: pr.data.head.sha,
              per_page: 100,
            })

            const failedCheckNames = checks.data.check_runs
              .filter((c) => c.conclusion === 'failure' || c.conclusion === 'timed_out' || c.conclusion === 'cancelled')
              .map((c) => c.name)

            if (target === 'mobile-visual') {
              const hasMobileFailure = failedCheckNames.some((n) => /Mobile visual regression/i.test(n))
              if (!hasMobileFailure) return stop('No failing Mobile visual regression check found on PR head SHA')
            }

            if (target === 'elite-visual') {
              // Allow privileged manual/label-triggered refreshes because elite baselines must be authored in CI's Ubuntu rendering environment.
            }

            setOut('run', 'true')
            setOut('reason', 'Ready')
            setOut('pr_number', String(prNumber))
            setOut('head_ref', pr.data.head.ref)
            setOut('head_sha', pr.data.head.sha)
            setOut('target', target)

      - name: Comment when autofix is skipped
        if: steps.detect.outputs.run != 'true' && github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v8
        env:
          AUTOFIX_REASON: ${{ steps.detect.outputs.reason }}
        with:
          script: |
            const prNumber = context.payload.issue?.number || context.payload.pull_request?.number
            if (!prNumber) return
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `Autofix skipped: ${process.env.AUTOFIX_REASON || 'No reason provided'}`,
            })

  autofix-mobile-visual:
    name: Autofix mobile visual baseline
    needs: detect
    if: needs.detect.outputs.run == 'true' && needs.detect.outputs.target == 'mobile-visual'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.detect.outputs.head_ref }}

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Update mobile visual snapshots
        run: npx playwright test tests/e2e/mobile-visual.spec.ts --project=mobile-iphone --project=mobile-android --update-snapshots

      - name: Re-run mobile visual suite
        run: npm run test:e2e:mobile-visual

      - name: Commit and push updated baselines
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          if ! git diff --quiet -- tests/e2e/__screenshots__/; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add tests/e2e/__screenshots__/*.png
            git commit -m "chore(ci): refresh mobile visual baselines"
            git push origin HEAD:${{ needs.detect.outputs.head_ref }}
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment result on PR
        if: github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v8
        with:
          script: |
            const changed = '${{ steps.commit.outputs.changed }}' === 'true'
            const body = changed
              ? 'Autofix complete: refreshed mobile visual baselines and pushed a bot commit to this PR branch.'
              : 'Autofix complete: mobile visual suite passed and no baseline changes were required.'

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ needs.detect.outputs.pr_number }}'),
              body,
            })

  autofix-elite-visual:
    name: Autofix elite visual baseline
    needs: detect
    if: needs.detect.outputs.run == 'true' && needs.detect.outputs.target == 'elite-visual'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.detect.outputs.head_ref }}

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Update elite mobile visual snapshots
        env:
          PLAYWRIGHT_BASE_URL: https://starting-monday-staging.up.railway.app
        run: npx playwright test tests/e2e/mobile-elite-visual.spec.ts --project=mobile-iphone --project=mobile-android --workers=1 --update-snapshots

      - name: Re-run elite mobile visual suite
        env:
          PLAYWRIGHT_BASE_URL: https://starting-monday-staging.up.railway.app
        run: node scripts/check-mobile-elite-visual-gate.mjs

      - name: Commit and push updated elite baselines
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          if ! git diff --quiet -- tests/e2e/__screenshots__/; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add tests/e2e/__screenshots__/*.png
            git commit -m "chore(ci): refresh elite mobile visual baselines"
            git push origin HEAD:${{ needs.detect.outputs.head_ref }}
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment result on PR
        if: github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v8
        with:
          script: |
            const changed = '${{ steps.commit.outputs.changed }}' === 'true'
            const body = changed
              ? 'Autofix complete: refreshed elite mobile visual baselines in the CI rendering environment and pushed a bot commit to this PR branch.'
              : 'Autofix complete: elite mobile visual suite passed and no baseline changes were required.'

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ needs.detect.outputs.pr_number }}'),
              body,
            })

