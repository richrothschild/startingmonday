name: Production Growth Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  growth-production-gate-advisory:
    name: growth-production-gate (advisory)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Growth synthetic council strict gate
        run: npm run growth:council:strict

      - name: Refresh growth metrics from PostHog
        env:
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
        run: npm run growth:metrics:export:strict

      - name: Growth strict metrics gate
        run: npm run growth:metrics:strict

      - name: Sitewide release-note artifact check
        run: npm run release:sitewide-note:strict

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  growth-production-gate:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Growth synthetic council strict gate
        run: npm run growth:council:strict

      - name: Refresh growth metrics from PostHog
        env:
          POSTHOG_PROJECT_ID: ${{ secrets.POSTHOG_PROJECT_ID }}
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
        run: npm run growth:metrics:export:strict

      - name: Growth strict metrics gate
        run: npm run growth:metrics:strict

      - name: Sitewide release-note artifact check
        run: npm run release:sitewide-note:strict

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
