name: Production Growth Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  growth-production-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Growth synthetic council strict gate
        run: npm run growth:council:strict

      - name: Growth strict metrics gate
        run: npm run growth:metrics:strict

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
