name: Luxury UX Tiered Gate

on:
  pull_request:
    branches: [main, staging]
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      tier:
        description: Enforcement tier to run
        required: false
        default: public-premium
        type: choice
        options:
          - public-premium
          - public-all
          - all-pages

jobs:
  luxury-ux-static:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve Enforcement Tier
        id: tier
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "value=public-all" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tier || 'public-premium' }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=public-premium" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tiered luxury gate
        run: |
          if [ "${{ steps.tier.outputs.value }}" = "public-all" ]; then
            npm run ux:luxury:static:public-all
          elif [ "${{ steps.tier.outputs.value }}" = "all-pages" ]; then
            npm run ux:luxury:static:all-pages
          else
            npm run ux:luxury:static
          fi

      - name: Generate trend report artifacts
        if: always()
        run: |
          mkdir -p artifacts
          node scripts/check-luxury-ux-static-gate.mjs --enforce-tier=${{ steps.tier.outputs.value }} --report-only --report-json=artifacts/luxury-ux-${{ steps.tier.outputs.value }}.json --report-md=artifacts/luxury-ux-${{ steps.tier.outputs.value }}.md --top=20

      - name: Publish step summary
        if: always()
        run: |
          echo "## Luxury UX Trend (${{ steps.tier.outputs.value }})" >> "$GITHUB_STEP_SUMMARY"
          cat artifacts/luxury-ux-${{ steps.tier.outputs.value }}.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload trend artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: luxury-ux-trend-${{ steps.tier.outputs.value }}-${{ github.run_number }}
          path: artifacts/
          if-no-files-found: error
