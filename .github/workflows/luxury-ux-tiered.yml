name: Luxury UX Tiered Gate

on:
  pull_request:
    branches: [main, staging]
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      tier:
        description: Enforcement tier to run
        required: false
        default: public-premium
        type: choice
        options:
          - public-premium
          - public-all
          - all-pages

jobs:
  luxury-ux-static:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - runKind: pr
            tier: public-premium
          - runKind: nightly
            tier: public-all
    if: |
      (github.event_name == 'pull_request' && matrix.runKind == 'pr') ||
      (github.event_name == 'schedule' && matrix.runKind == 'nightly') ||
      (github.event_name == 'workflow_dispatch' && matrix.tier == (github.event.inputs.tier || 'public-premium'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tiered luxury gate
        run: |
          if [ "${{ matrix.tier }}" = "public-all" ]; then
            npm run ux:luxury:static:public-all
          elif [ "${{ matrix.tier }}" = "all-pages" ]; then
            npm run ux:luxury:static:all-pages
          else
            npm run ux:luxury:static
          fi

      - name: Generate trend report artifacts
        if: always()
        run: |
          mkdir -p artifacts
          node scripts/check-luxury-ux-static-gate.mjs --enforce-tier=${{ matrix.tier }} --report-only --report-json=artifacts/luxury-ux-${{ matrix.tier }}.json --report-md=artifacts/luxury-ux-${{ matrix.tier }}.md --top=20

      - name: Publish step summary
        if: always()
        run: |
          echo "## Luxury UX Trend (${{ matrix.tier }})" >> "$GITHUB_STEP_SUMMARY"
          cat artifacts/luxury-ux-${{ matrix.tier }}.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload trend artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: luxury-ux-trend-${{ matrix.tier }}-${{ github.run_number }}
          path: artifacts/
          if-no-files-found: error
