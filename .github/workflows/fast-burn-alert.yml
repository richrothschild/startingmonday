name: Fast-Burn Alert

# Runs offset from monitoring.yml (which runs at */30) to avoid double-alerts.
# Checks consecutive monitoring run failures as a proxy for fast error-budget burn.
# Triggers a Sev-1 alert when 3+ consecutive production smoke runs have failed.

on:
  schedule:
    - cron: '10,40 * * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  fast-burn-check:
    name: Detect consecutive monitoring failures (fast-burn proxy)
    runs-on: ubuntu-latest

    steps:
      - name: Check consecutive monitoring failures
        id: burn
        uses: actions/github-script@v7
        with:
          script: |
            // Look at the last 6 production monitoring runs (~3 hours window).
            // 3 consecutive failures = fast-burn condition (budget burning ~14x).
            const res = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'monitoring.yml',
              status: 'completed',
              per_page: 6,
              branch: 'main',
              exclude_pull_requests: true,
            })

            const runs = res.data.workflow_runs ?? []
            if (runs.length === 0) {
              core.notice('No completed monitoring runs found — skipping fast-burn check')
              core.setOutput('fast_burn', 'false')
              return
            }

            // Count consecutive failures from the most recent run backward
            let consecutiveFails = 0
            for (const run of runs) {
              if (run.conclusion === 'failure') {
                consecutiveFails++
              } else {
                break
              }
            }

            const summary = `Last ${runs.length} runs — ${consecutiveFails} consecutive failure(s). ` +
              `Conclusions: ${runs.map(r => r.conclusion).join(', ')}`
            core.notice(summary)

            core.setOutput('consecutive_fails', String(consecutiveFails))
            core.setOutput('fast_burn', consecutiveFails >= 3 ? 'true' : 'false')
            core.setOutput('summary', summary)

      - name: Send Sev-1 fast-burn alert
        if: steps.burn.outputs.fast_burn == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          CONSECUTIVE="${{ steps.burn.outputs.consecutive_fails }}"
          SUMMARY="${{ steps.burn.outputs.summary }}"
          curl -X POST -H 'Content-type: application/json' --data "{
            \"text\": \"P0 FAST-BURN ALERT — ${CONSECUTIVE} consecutive production smoke failures\",
            \"blocks\": [
              {
                \"type\": \"header\",
                \"text\": {
                  \"type\": \"plain_text\",
                  \"text\": \"🔥 P0 Fast-Burn Alert — Sev-1\"
                }
              },
              {
                \"type\": \"section\",
                \"text\": {
                  \"type\": \"mrkdwn\",
                  \"text\": \"*${CONSECUTIVE} consecutive production smoke check failures detected.*\nThis indicates P0 error budget is burning rapidly.\n\n${SUMMARY}\n\n*Immediate action required.* See runbook: docs/sre/runbooks/\"
                }
              },
              {
                \"type\": \"section\",
                \"text\": {
                  \"type\": \"mrkdwn\",
                  \"text\": \"<${{ github.server_url }}/${{ github.repository }}/actions/workflows/monitoring.yml|View monitoring runs>\"
                }
              }
            ]
          }" "$SLACK_WEBHOOK_URL"
