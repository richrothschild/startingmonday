name: Fast-Burn Alert

# Runs offset from monitoring.yml (which runs at */30) to avoid double-alerts.
# Checks consecutive monitoring and synthetic run failures as a proxy for fast error-budget burn.
# Triggers a Sev-1 alert only when both signals show sustained degradation.

on:
  schedule:
    - cron: '10,40 * * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  fast-burn-check:
    name: Detect consecutive monitoring failures (fast-burn proxy)
    runs-on: ubuntu-latest

    steps:
      - name: Check consecutive monitoring and synthetic failures
        id: burn
        uses: actions/github-script@v8
        with:
          script: |
            // Require overlap between smoke checks and deeper synthetics before escalating.
            // Monitoring alone is too noisy; real burn should show up in both signals.
            const monitoringRes = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'monitoring.yml',
              status: 'completed',
              per_page: 6,
              branch: 'main',
              exclude_pull_requests: true,
            })

            const syntheticsRes = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'production-synthetics.yml',
              status: 'completed',
              per_page: 4,
              branch: 'main',
              exclude_pull_requests: true,
            })

            const monitoringRuns = monitoringRes.data.workflow_runs ?? []
            const syntheticRuns = syntheticsRes.data.workflow_runs ?? []

            if (monitoringRuns.length === 0 || syntheticRuns.length === 0) {
              core.notice('No completed monitoring or synthetic runs found — skipping fast-burn check')
              core.setOutput('fast_burn', 'false')
              return
            }

            // Count consecutive failures from the most recent run backward.
            let monitoringConsecutiveFails = 0
            for (const run of monitoringRuns) {
              if (run.conclusion === 'failure') {
                monitoringConsecutiveFails++
              } else {
                break
              }
            }

            let syntheticConsecutiveFails = 0
            for (const run of syntheticRuns) {
              if (run.conclusion === 'failure') {
                syntheticConsecutiveFails++
              } else {
                break
              }
            }

            const monitoringSummary = `Monitoring: ${monitoringConsecutiveFails} consecutive failure(s) from ${monitoringRuns.length} runs`
            const syntheticsSummary = `Synthetics: ${syntheticConsecutiveFails} consecutive failure(s) from ${syntheticRuns.length} runs`
            const summary = `${monitoringSummary} | ${syntheticsSummary}. ` +
              `Monitoring conclusions: ${monitoringRuns.map(r => r.conclusion).join(', ')} | ` +
              `Synthetics conclusions: ${syntheticRuns.map(r => r.conclusion).join(', ')}`

            core.notice(summary)

            const fastBurn = monitoringConsecutiveFails >= 3 && syntheticConsecutiveFails >= 2

            core.setOutput('monitoring_consecutive_fails', String(monitoringConsecutiveFails))
            core.setOutput('synthetic_consecutive_fails', String(syntheticConsecutiveFails))
            core.setOutput('fast_burn', fastBurn ? 'true' : 'false')
            core.setOutput('summary', summary)

      - name: Send Sev-1 fast-burn alert
        if: steps.burn.outputs.fast_burn == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          MONITORING_CONSECUTIVE="${{ steps.burn.outputs.monitoring_consecutive_fails }}"
          SYNTHETIC_CONSECUTIVE="${{ steps.burn.outputs.synthetic_consecutive_fails }}"
          SUMMARY="${{ steps.burn.outputs.summary }}"
          curl -X POST -H 'Content-type: application/json' --data "{
            \"text\": \"P0 FAST-BURN ALERT — overlapping monitoring and synthetic failures\",
            \"blocks\": [
              {
                \"type\": \"header\",
                \"text\": {
                  \"type\": \"plain_text\",
                  \"text\": \"🔥 P0 Fast-Burn Alert — Sev-1\"
                }
              },
              {
                \"type\": \"section\",
                \"text\": {
                  \"type\": \"mrkdwn\",
                  \"text\": \"*Monitoring failures:* ${MONITORING_CONSECUTIVE} consecutive\n*Synthetics failures:* ${SYNTHETIC_CONSECUTIVE} consecutive\n\n${SUMMARY}\n\n*Immediate action required.* See runbook: docs/sre/runbooks/\"
                }
              },
              {
                \"type\": \"section\",
                \"text\": {
                  \"type\": \"mrkdwn\",
                  \"text\": \"<${{ github.server_url }}/${{ github.repository }}/actions/workflows/monitoring.yml|View monitoring runs>\"
                }
              }
            ]
          }" "$SLACK_WEBHOOK_URL"
