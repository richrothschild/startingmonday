name: Cognitive Calibration Loop

on:
  schedule:
    - cron: "0 15 1 */3 *"
  workflow_dispatch:
    inputs:
      auditor_run_id:
        description: Optional workflow run ID containing the latest Page Experience Auditor artifact
        required: false
        default: ""

permissions:
  actions: read
  contents: read

jobs:
  cognitive-calibration-loop:
    name: Run quarterly deterministic-vs-auditor calibration
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Resolve latest Page Experience Auditor run
        id: auditor_run
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.auditor_run_id == '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=$(gh api \
            "/repos/${GITHUB_REPOSITORY}/actions/workflows/cognitive-fluency-auditor.yml/runs?status=success&per_page=1" \
            --jq '.workflow_runs[0].id // empty')
          if [ -z "$RUN_ID" ]; then
            echo "No successful cognitive-fluency-auditor workflow run found." >&2
            exit 1
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download Page Experience Auditor artifact
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.auditor_run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.auditor_run_id }}
          name: cognitive-fluency-auditor-latest
          path: docs/status

      - name: Download latest Page Experience Auditor artifact
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.auditor_run_id == '' }}
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.auditor_run.outputs.run_id }}
          name: cognitive-fluency-auditor-latest
          path: docs/status

      - name: Refresh deterministic cognitive snapshot
        env:
          RELIABILITY_SLACK_CHANNEL: reliability---service
          SLACK_RELIABILITY_SERVICE_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node scripts/cognitive-load-agent.mjs

      - name: Run quarterly calibration loop
        env:
          RELIABILITY_SLACK_CHANNEL: reliability---service
          SLACK_RELIABILITY_SERVICE_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node scripts/cognitive-calibration-loop.mjs

      - name: Upload calibration loop artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: cognitive-calibration-loop-latest
          path: |
            docs/status/cognitive-load.latest.json
            docs/status/cognitive-load.latest.md
            docs/status/cognitive-calibration-loop.latest.json
            docs/status/cognitive-calibration-loop.latest.md
            docs/status/cognitive-fluency-auditor.latest.json
          retention-days: 90
          if-no-files-found: warn

      - name: Alert when calibration loop workflow fails
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "No Slack webhook configured; skipping failure alert."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -X POST -H 'Content-type: application/json' --data '{
            "text": "Cognitive calibration loop workflow failed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Cognitive calibration loop workflow failed*\nChannel: reliability---service\n<'"$RUN_URL"'|View workflow run>"
                }
              }
            ]
          }' "$SLACK_WEBHOOK_URL"
