name: Experience Portfolio Rollup

on:
  schedule:
    - cron: '35 13 * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  experience-portfolio-rollup:
    name: Aggregate experience agent issues and actions
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v5

      - name: Restore portfolio history cache
        id: restore-portfolio-history
        uses: actions/cache/restore@v4
        with:
          path: docs/status/experience-portfolio-rollup.history.json
          key: portfolio-history-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            portfolio-history-${{ github.ref_name }}-

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Refresh trust integrity snapshot
        env:
          PLAYWRIGHT_BASE_URL: https://startingmonday.app
          PLAYWRIGHT_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
          PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}
          SLACK_UI_DELIVERY_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_UI_DELIVERY_CHANNEL: reliability---service
        run: |
          node scripts/trust-integrity-agent.mjs \
            --base-url "$PLAYWRIGHT_BASE_URL" \
            --report docs/status/trust-integrity.latest.json || true

      - name: Refresh route inventory snapshot
        env:
          RELIABILITY_SLACK_CHANNEL: reliability---service
          SLACK_RELIABILITY_SERVICE_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node scripts/experience-route-inventory.mjs

      - name: Refresh experience vitals snapshot
        env:
          PLAYWRIGHT_BASE_URL: https://startingmonday.app
          PLAYWRIGHT_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
          PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}
          SLACK_UI_DELIVERY_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_UI_DELIVERY_CHANNEL: reliability---service
        run: |
          node scripts/experience-vitals-agent.mjs \
            --base-url "$PLAYWRIGHT_BASE_URL" \
            --inventory docs/status/route-inventory.latest.json \
            --baseline config/experience-vitals-baseline.json \
            --report docs/status/experience-vitals.latest.json

      - name: Refresh cognitive snapshot
        env:
          RELIABILITY_SLACK_CHANNEL: reliability---service
          SLACK_RELIABILITY_SERVICE_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node scripts/cognitive-load-agent.mjs

      - name: Refresh luxury sentinel snapshot
        env:
          SENTINEL_BASE_URL: https://startingmonday.app
        run: |
          node scripts/luxury-page-sentinel.mjs \
            --base-url=https://startingmonday.app \
            --report-only \
            --output-json=docs/status/luxury-page-sentinel.latest.json

      - name: Refresh journey metrics snapshot from production synthetics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPO="${GITHUB_REPOSITORY##*/}"
          mkdir -p docs/status tmp/journey-metrics

          RUN_ID=$(gh api \
            "/repos/${OWNER}/${REPO}/actions/workflows/production-synthetics.yml/runs?branch=main&status=completed&per_page=12" \
            --jq '.workflow_runs[] | select(.conclusion == "success") | .id' | head -n 1)

          if [ -z "${RUN_ID:-}" ]; then
            echo "No successful production-synthetics run found; skipping journey metrics refresh."
            if [ ! -f docs/status/synthetic-journey-metrics.latest.json ]; then
              echo '{"generatedAt": null, "source": "unavailable"}' > docs/status/synthetic-journey-metrics.latest.json
            fi
            exit 0
          fi

          ARTIFACT_URL=$(gh api \
            "/repos/${OWNER}/${REPO}/actions/runs/${RUN_ID}/artifacts" \
            --jq '.artifacts[] | select(.name == "synthetic-results" and .expired == false) | .archive_download_url' | head -n 1)

          if [ -z "${ARTIFACT_URL:-}" ]; then
            echo "No synthetic-results artifact found on run ${RUN_ID}; skipping journey metrics refresh."
            if [ ! -f docs/status/synthetic-journey-metrics.latest.json ]; then
              echo '{"generatedAt": null, "source": "unavailable"}' > docs/status/synthetic-journey-metrics.latest.json
            fi
            exit 0
          fi

          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${ARTIFACT_URL}" \
            -o tmp/journey-metrics/synthetic-results.zip

          unzip -qo tmp/journey-metrics/synthetic-results.zip synthetic-journey-metrics.json -d tmp/journey-metrics

          if [ ! -f tmp/journey-metrics/synthetic-journey-metrics.json ]; then
            echo "synthetic-journey-metrics.json missing inside synthetic-results artifact."
            if [ ! -f docs/status/synthetic-journey-metrics.latest.json ]; then
              echo '{"generatedAt": null, "source": "unavailable"}' > docs/status/synthetic-journey-metrics.latest.json
            fi
            exit 0
          fi

          cp tmp/journey-metrics/synthetic-journey-metrics.json docs/status/synthetic-journey-metrics.latest.json
      - name: Generate portfolio rollup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELIABILITY_SLACK_CHANNEL: reliability---service
          SLACK_RELIABILITY_SERVICE_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node scripts/experience-portfolio-rollup.mjs

      - name: Upload portfolio rollup artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: experience-portfolio-rollup-latest
          path: |
            docs/status/trust-integrity.latest.json
            docs/status/trust-integrity.latest.md
            docs/status/route-inventory.latest.json
            docs/status/route-inventory.latest.md
            docs/status/experience-vitals.latest.json
            docs/status/experience-vitals.latest.md
            docs/status/cognitive-load.latest.json
            docs/status/cognitive-load.latest.md
            docs/status/luxury-page-sentinel.latest.json
            docs/status/synthetic-journey-metrics.latest.json
            docs/status/experience-portfolio-rollup.latest.json
            docs/status/experience-portfolio-rollup.latest.md
            docs/status/experience-portfolio-rollup.history.json
          retention-days: 30

      - name: Save portfolio history cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: docs/status/experience-portfolio-rollup.history.json
          key: portfolio-history-${{ github.ref_name }}-${{ github.run_id }}

      - name: Alert when portfolio rollup fails
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "No Slack webhook configured; skipping failure alert."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -X POST -H 'Content-type: application/json' --data '{
            "text": "🚨 Experience portfolio rollup failed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Experience portfolio rollup failed*\nChannel: reliability---service\n<'"$RUN_URL"'|View workflow run>"
                }
              }
            ]
          }' "$SLACK_WEBHOOK_URL"
