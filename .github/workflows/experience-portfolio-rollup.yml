name: Experience Portfolio Rollup

on:
  schedule:
    - cron: '35 13 * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  experience-portfolio-rollup:
    name: Aggregate experience agent issues and actions
    runs-on: ubuntu-latest
    timeout-minutes: 25
  timeout-minutes: 25

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Refresh trust integrity snapshot
        env:
          PLAYWRIGHT_BASE_URL: https://startingmonday.app
          PLAYWRIGHT_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
          PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}
          SLACK_UI_DELIVERY_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_UI_DELIVERY_CHANNEL: reliability---service
        run: |
          node scripts/trust-integrity-agent.mjs \
            --base-url "$PLAYWRIGHT_BASE_URL" \
            --report docs/status/trust-integrity.latest.json || true

      - name: Refresh route inventory snapshot
        env:
          RELIABILITY_SLACK_CHANNEL: reliability---service
          SLACK_RELIABILITY_SERVICE_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node scripts/experience-route-inventory.mjs

      - name: Refresh experience vitals snapshot
        env:
          PLAYWRIGHT_BASE_URL: https://startingmonday.app
          PLAYWRIGHT_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
          PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}
          SLACK_UI_DELIVERY_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_UI_DELIVERY_CHANNEL: reliability---service
        run: |
          node scripts/experience-vitals-agent.mjs \
            --base-url "$PLAYWRIGHT_BASE_URL" \
            --inventory docs/status/route-inventory.latest.json \
            --baseline config/experience-vitals-baseline.json \
            --report docs/status/experience-vitals.latest.json

      - name: Refresh cognitive snapshot
        env:
          RELIABILITY_SLACK_CHANNEL: reliability---service
          SLACK_RELIABILITY_SERVICE_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node scripts/cognitive-load-agent.mjs

      - name: Refresh luxury sentinel snapshot
        env:
          SENTINEL_BASE_URL: https://startingmonday.app
        run: |
          node scripts/luxury-page-sentinel.mjs \
            --base-url=https://startingmonday.app \
            --report-only \
            --output-json=docs/status/luxury-page-sentinel.latest.json
      - name: Generate portfolio rollup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELIABILITY_SLACK_CHANNEL: reliability---service
          SLACK_RELIABILITY_SERVICE_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node scripts/experience-portfolio-rollup.mjs

      - name: Upload portfolio rollup artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: experience-portfolio-rollup-latest
          path: |
            docs/status/trust-integrity.latest.json
            docs/status/trust-integrity.latest.md
            docs/status/route-inventory.latest.json
            docs/status/route-inventory.latest.md
            docs/status/experience-vitals.latest.json
            docs/status/experience-vitals.latest.md
            docs/status/cognitive-load.latest.json
            docs/status/cognitive-load.latest.md
            docs/status/luxury-page-sentinel.latest.json
            docs/status/experience-portfolio-rollup.latest.json
            docs/status/experience-portfolio-rollup.latest.md
          retention-days: 30

      - name: Alert when portfolio rollup fails
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "No Slack webhook configured; skipping failure alert."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -X POST -H 'Content-type: application/json' --data '{
            "text": "🚨 Experience portfolio rollup failed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Experience portfolio rollup failed*\nChannel: reliability---service\n<'"$RUN_URL"'|View workflow run>"
                }
              }
            ]
          }' "$SLACK_WEBHOOK_URL"
