name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  predeploy-gates:
    name: Predeploy gates (lint, typecheck, build, smoke)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Dependency policy check
        run: npm run deps:check

      - name: Documentation command check
        run: npm run docs:check-commands

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Lint baseline regression check
        run: npm run lint:check-baseline

      - name: Type check
        run: npm run typecheck

      - name: Code council strict audit
        run: npm run audit:code-council:strict

      - name: Build
        run: npm run build

      - name: Outreach format check
        run: node scripts/check-outreach-format.mjs

      - name: Executive fit criteria check
        run: node scripts/check-executive-fit-criteria.mjs

      - name: Start app for smoke checks
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3000 > /tmp/next-start.log 2>&1 &
          echo $! > /tmp/next-start.pid

      - name: Wait for app readiness
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/api/health > /dev/null; then
              echo "App is ready"
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready in time"
          tail -n 200 /tmp/next-start.log || true
          exit 1

      - name: Smoke checks
        env:
          MONITOR_BASE_URL: http://127.0.0.1:3000
          MONITOR_OUTPUT_JSON: '1'
        run: npm run monitor:smoke:json

      - name: Stop app
        if: always()
        run: |
          if [ -f /tmp/next-start.pid ]; then
            kill "$(cat /tmp/next-start.pid)" || true
          fi
          tail -n 200 /tmp/next-start.log || true

      - name: Run tests
        run: npm test

      - name: Check for em-dashes
        run: |
          if grep -rP "\xe2\x80\x94" src/; then
            echo "Em-dash (—) found in src/. Use a regular hyphen or reword."
            exit 1
          fi

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    # Run on all PRs and protected branches — blocks merge on failure.
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.ref == 'refs/heads/staging' && 'https://starting-monday-staging-production.up.railway.app' || secrets.PLAYWRIGHT_BASE_URL }}
          PLAYWRIGHT_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
          PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  pre-prod-gate:
    name: Pre-production synthetic gate
    runs-on: ubuntu-latest
    # Only gate on main/staging pushes that will trigger a deploy.
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    needs: [predeploy-gates]
    permissions:
      actions: read
      contents: read

    steps:
      - name: Check production synthetic pass rate (last 3 runs)
        id: gate
        uses: actions/github-script@v8
        with:
          script: |
            // Require the last 3 production-synthetics runs to have all passed.
            // This ensures we are not deploying into an already-degraded production.
            const res = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'production-synthetics.yml',
              status: 'completed',
              per_page: 3,
              branch: 'main',
              exclude_pull_requests: true,
            })

            const runs = res.data.workflow_runs ?? []
            if (runs.length === 0) {
              core.notice('No completed production-synthetics runs found — gate is advisory, allowing deploy')
              core.setOutput('gate_pass', 'true')
              return
            }

            const failures = runs.filter(r => r.conclusion === 'failure')
            const summary = runs.map(r => `${r.conclusion}(${r.id})`).join(', ')
            core.notice(`Production synthetics last 3 runs: ${summary}`)

            if (failures.length > 0) {
              const msg = `Pre-prod gate BLOCKED: ${failures.length}/${runs.length} production synthetic runs are failing. ` +
                `Resolve synthetic failures before deploying. Runs: ${summary}`
              core.setOutput('gate_pass', 'false')
              core.setOutput('summary', msg)
              core.setFailed(msg)
            } else {
              core.setOutput('gate_pass', 'true')
              core.notice('Pre-prod gate PASSED: all recent production synthetics are green')
            }

  semgrep:
    name: Semgrep security scan
    runs-on: ubuntu-latest
    # Run on PRs and main pushes; skip dependabot to avoid noise
    if: github.actor != 'dependabot[bot]'

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Run Semgrep (custom rules)
        continue-on-error: true
        uses: returntocorp/semgrep-action@v1
        with:
          config: .semgrep.yml

      - name: Upload Semgrep findings to Semgrep Cloud (optional)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
        continue-on-error: true
        run: |
          if [ -z "${SEMGREP_APP_TOKEN:-}" ]; then
            echo "SEMGREP_APP_TOKEN not set in runner environment; skipping Semgrep Cloud upload."
            exit 0
          fi

          python3 -m pip install --upgrade semgrep
          semgrep ci --config auto

  notify-failure:
    name: Notify Slack on failure
    runs-on: ubuntu-latest
    needs: [predeploy-gates, semgrep, playwright, pre-prod-gate]
    if: failure() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')

    steps:
      - name: Determine failed job
        id: failed-job
        run: |
          if [[ "${{ needs.predeploy-gates.result }}" == "failure" ]]; then
            echo "job_name=Predeploy gates (lint, typecheck, build, smoke)" >> $GITHUB_OUTPUT
            echo "job_link=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.pre-prod-gate.result }}" == "failure" ]]; then
            echo "job_name=Pre-production synthetic gate" >> $GITHUB_OUTPUT
            echo "job_link=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.semgrep.result }}" == "failure" ]]; then
            echo "job_name=Semgrep security scan" >> $GITHUB_OUTPUT
            echo "job_link=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.playwright.result }}" == "failure" ]]; then
            echo "job_name=Playwright E2E" >> $GITHUB_OUTPUT
            echo "job_link=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          payload: |
            {
              "text": "❌ CI Build Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ CI Build Failed"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n`${{ github.ref_name }}`"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.actor }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Failed Job:*\n${{ steps.failed-job.outputs.job_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<${{ steps.failed-job.outputs.job_link }}|View full build logs →>"
                  }
                }
              ]
            }

  notify-test-summary:
    name: Post test summary report
    runs-on: ubuntu-latest
    needs: [predeploy-gates, semgrep, playwright, pre-prod-gate]
    if: always()

    steps:
      - name: Build summary message
        id: summary
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PREDEPLOY="${{ needs.predeploy-gates.result }}"
          SEMGREP="${{ needs.semgrep.result }}"
          PLAYWRIGHT="${{ needs.playwright.result }}"
          PREPROD="${{ needs.pre-prod-gate.result }}"

          STATUS="PASS"
          if [ "$PREDEPLOY" = "failure" ] || [ "$SEMGREP" = "failure" ] || [ "$PLAYWRIGHT" = "failure" ] || [ "$PREPROD" = "failure" ]; then
            STATUS="FAIL"
          fi

          SUMMARY=$(printf 'CI test summary (%s)\nBranch: %s\nActor: %s\npredeploy-gates: %s\nsemgrep: %s\nplaywright: %s\npre-prod-gate: %s\nRun: %s\n' "$STATUS" "${{ github.ref_name }}" "${{ github.actor }}" "$PREDEPLOY" "$SEMGREP" "$PLAYWRIGHT" "$PREPROD" "$RUN_URL")

          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "summary<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Evaluate email noise-control policy
        id: email-policy
        if: always()
        uses: actions/github-script@v8
        env:
          CURRENT_STATUS: ${{ steps.summary.outputs.status }}
          FAILURE_STREAK_THRESHOLD: ${{ vars.CI_FAILURE_EMAIL_STREAK_THRESHOLD }}
        with:
          script: |
            const currentStatus = (process.env.CURRENT_STATUS || '').trim().toUpperCase()
            const rawThreshold = Number(process.env.FAILURE_STREAK_THRESHOLD || '3')
            const threshold = Number.isFinite(rawThreshold) && rawThreshold >= 1 ? Math.floor(rawThreshold) : 3

            // Only gate failure notifications. Pass summaries keep existing behavior.
            if (currentStatus !== 'FAIL') {
              core.setOutput('send_email', 'false')
              core.setOutput('failure_streak', '0')
              core.setOutput('threshold', String(threshold))
              core.setOutput('reason', 'Current status is PASS; failure streak policy not applicable')
              return
            }

            const branch = context.ref.replace('refs/heads/', '')
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              branch,
              status: 'completed',
              per_page: 100,
              exclude_pull_requests: true,
            })

            let priorFailures = 0
            for (const run of runs) {
              if (run.id === context.runId) continue

              if (run.conclusion === 'failure') {
                priorFailures += 1
                continue
              }

              // Stop at first non-failure run; streak is consecutive failures only.
              break
            }

            const failureStreak = priorFailures + 1
            const sendEmail = failureStreak >= threshold && (failureStreak === threshold || failureStreak % threshold === 0)

            core.setOutput('send_email', sendEmail ? 'true' : 'false')
            core.setOutput('failure_streak', String(failureStreak))
            core.setOutput('threshold', String(threshold))
            core.setOutput(
              'reason',
              sendEmail
                ? `Sending failure summary at streak ${failureStreak} (threshold ${threshold})`
                : `Suppressing failure summary at streak ${failureStreak}; threshold ${threshold}`
            )

      - name: Log email policy decision
        if: always()
        run: |
          echo "Email policy decision: ${{ steps.email-policy.outputs.reason }}"
          echo "failure_streak=${{ steps.email-policy.outputs.failure_streak }} threshold=${{ steps.email-policy.outputs.threshold }}"

      - name: Post Slack summary
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SUMMARY_TEXT: ${{ steps.summary.outputs.summary }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured; skipping Slack summary"
            exit 0
          fi

          payload=$(jq -n --arg text "$SUMMARY_TEXT" '{text:$text}')
          curl -sS -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"

      - name: Send email summary
        if: always() && (steps.summary.outputs.status == 'PASS' || steps.email-policy.outputs.send_email == 'true')
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_ADDRESS: ${{ secrets.RESEND_FROM_ADDRESS }}
          WEEKLY_AUDIT_EMAIL_TO: ${{ secrets.WEEKLY_AUDIT_EMAIL_TO }}
          SUMMARY_TEXT: ${{ steps.summary.outputs.summary }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "RESEND_API_KEY not configured; skipping email summary"
            exit 0
          fi

          FROM=${RESEND_FROM_ADDRESS:-briefing@startingmonday.app}
          TO=${WEEKLY_AUDIT_EMAIL_TO:-richard@startingmonday.app}
          DATE=$(date -u +"%Y-%m-%d")

          payload=$(jq -n \
            --arg from "$FROM" \
            --arg to "$TO" \
            --arg subject "Starting Monday CI Test Summary - $DATE" \
            --arg text "$SUMMARY_TEXT" \
            '{from:$from,to:[$to],subject:$subject,text:$text}')

          curl -sS -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$payload"
