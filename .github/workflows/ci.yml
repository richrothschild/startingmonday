name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ux-ui-rubric-contract:
    name: ux-ui-rubric-contract
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate monitoring coverage matrix and harness
        run: npm run monitor:coverage:refresh

      - name: Monitoring coverage check (advisory)
        run: npm run monitor:matrix:check || true

      - name: Upload monitoring coverage artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: monitoring-coverage-matrix
          path: |
            docs/status/monitoring-coverage-matrix.latest.json
            docs/status/monitoring-coverage-matrix.latest.md
            tests/e2e/generated/
          retention-days: 14

      - name: Run UX/UI rubric page contract
        run: npm run ux:rubric:pages

  predeploy-gates:
    name: Predeploy gates (lint, typecheck, build, smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Dependency policy check
        run: npm run deps:check

      - name: Documentation command check
        run: npm run docs:check-commands

      - name: Release UX checklist policy check
        run: npm run release:ux:checklist:check

      - name: Install dependencies
        run: npm ci

      - name: Billing readiness gate (strict)
        if: github.ref == 'refs/heads/main'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          STRIPE_PRICE_PASSIVE: ${{ secrets.STRIPE_PRICE_PASSIVE }}
          STRIPE_PRICE_PASSIVE_ANNUAL: ${{ secrets.STRIPE_PRICE_PASSIVE_ANNUAL }}
          STRIPE_PRICE_ACTIVE: ${{ secrets.STRIPE_PRICE_ACTIVE }}
          STRIPE_PRICE_ACTIVE_ANNUAL: ${{ secrets.STRIPE_PRICE_ACTIVE_ANNUAL }}
          STRIPE_PRICE_EXECUTIVE: ${{ secrets.STRIPE_PRICE_EXECUTIVE }}
          STRIPE_PRICE_EXECUTIVE_ANNUAL: ${{ secrets.STRIPE_PRICE_EXECUTIVE_ANNUAL }}
          STRIPE_PRICE_PARTNER_PASSIVE: ${{ secrets.STRIPE_PRICE_PARTNER_PASSIVE }}
          STRIPE_PRICE_PARTNER_ACTIVE: ${{ secrets.STRIPE_PRICE_PARTNER_ACTIVE }}
        run: npm run billing:readiness:strict

      - name: Guide freshness check
        run: npm run guide:user:check

      - name: Internal guide freshness check
        run: npm run guide:internal:check

      - name: Guide retrieval evaluation (strict)
        run: npm run guide:retrieval:eval:strict

      - name: Lint
        run: npm run lint

      - name: Lint baseline regression check
        run: npm run lint:check-baseline

      - name: Type check
        run: npm run typecheck

      - name: Migration rollback readiness check
        run: npm run migration:rollback:check:strict

      - name: Mobile UX contract and banned pattern guard
        run: npm run mobile:guard

      - name: Code council audit (advisory on staging and PR)
        if: github.ref != 'refs/heads/main'
        run: npm run audit:code-council

      - name: Code council strict audit (main only)
        if: github.ref == 'refs/heads/main'
        run: npm run audit:code-council:strict

      - name: Build
        env:
          MOBILE_ELITE_GATE_STRICT: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging') && '1' || '0' }}
        run: npm run build

      - name: Outreach format check
        run: node scripts/check-outreach-format.mjs

      - name: Executive fit criteria check
        run: node scripts/check-executive-fit-criteria.mjs

      - name: Start app for smoke checks
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3000 > /tmp/next-start.log 2>&1 &
          echo $! > /tmp/next-start.pid

      - name: Wait for app readiness
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/api/health > /dev/null; then
              echo "App is ready"
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready in time"
          tail -n 200 /tmp/next-start.log || true
          exit 1

      - name: Smoke checks
        env:
          MONITOR_BASE_URL: http://127.0.0.1:3000
          MONITOR_OUTPUT_JSON: '1'
        run: npm run monitor:smoke:json

      - name: Stop app
        if: always()
        run: |
          if [ -f /tmp/next-start.pid ]; then
            kill "$(cat /tmp/next-start.pid)" || true
          fi
          tail -n 200 /tmp/next-start.log || true

      - name: Run tests
        run: npm test

      - name: Check for em-dashes
        run: |
          if grep -rP "\xe2\x80\x94" src/; then
            echo "Em-dash (—) found in src/. Use a regular hyphen or reword."
            exit 1
          fi

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.ref == 'refs/heads/staging' && 'https://starting-monday-staging.up.railway.app' || secrets.PLAYWRIGHT_BASE_URL }}
          PLAYWRIGHT_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
          PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}
          PLAYWRIGHT_SYNTH_SIGNUP_EMAIL: ${{ secrets.PLAYWRIGHT_SYNTH_SIGNUP_EMAIL }}
          PLAYWRIGHT_SYNTH_SIGNUP_PASSWORD: ${{ secrets.PLAYWRIGHT_SYNTH_SIGNUP_PASSWORD }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  playwright-pr:
    name: Playwright E2E (PR)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.ref == 'refs/heads/staging' && 'https://starting-monday-staging.up.railway.app' || secrets.PLAYWRIGHT_BASE_URL }}
          PLAYWRIGHT_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
          PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}
          PLAYWRIGHT_SYNTH_SIGNUP_EMAIL: ${{ secrets.PLAYWRIGHT_SYNTH_SIGNUP_EMAIL }}
          PLAYWRIGHT_SYNTH_SIGNUP_PASSWORD: ${{ secrets.PLAYWRIGHT_SYNTH_SIGNUP_PASSWORD }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report-pr
          path: playwright-report/
          retention-days: 7

  first-value-synthetic-gate:
    name: First-value synthetic gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Validate synthetic gate credentials
        env:
          PLAYWRIGHT_SYNTH_SIGNUP_EMAIL: ${{ secrets.PLAYWRIGHT_SYNTH_SIGNUP_EMAIL }}
          PLAYWRIGHT_SYNTH_SIGNUP_PASSWORD: ${{ secrets.PLAYWRIGHT_SYNTH_SIGNUP_PASSWORD }}
        run: |
          if [ -n "$PLAYWRIGHT_SYNTH_SIGNUP_EMAIL" ] && [ -n "$PLAYWRIGHT_SYNTH_SIGNUP_PASSWORD" ]; then
            echo "Using dedicated signup synthetic credentials"
            exit 0
          fi
          echo "Missing dedicated Playwright signup credentials for first-value gate"
          exit 1

      - name: Run signup-to-first-value synthetic (blocking)
        run: npx playwright test tests/e2e/synthetics.spec.ts --project=synthetics --grep "Synthetic-10"
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.ref == 'refs/heads/staging' && 'https://starting-monday-staging.up.railway.app' || secrets.PLAYWRIGHT_BASE_URL }}
          PLAYWRIGHT_SYNTH_SIGNUP_EMAIL: ${{ secrets.PLAYWRIGHT_SYNTH_SIGNUP_EMAIL }}
          PLAYWRIGHT_SYNTH_SIGNUP_PASSWORD: ${{ secrets.PLAYWRIGHT_SYNTH_SIGNUP_PASSWORD }}

      - name: Upload first-value synthetic artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: first-value-synthetic-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  mobile-visual-regression:
    name: Mobile visual regression
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run mobile visual snapshots
        run: npm run test:e2e:mobile-visual
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.ref == 'refs/heads/staging' && 'https://starting-monday-staging.up.railway.app' || secrets.PLAYWRIGHT_BASE_URL }}
          PLAYWRIGHT_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
          PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}

      - name: Upload mobile visual artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: mobile-visual-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  auth-ux-guard:
    name: Auth UX guard
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run auth UX guard suite
        run: npm run test:e2e:auth-ux
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.ref == 'refs/heads/staging' && 'https://starting-monday-staging.up.railway.app' || secrets.PLAYWRIGHT_BASE_URL }}

      - name: Upload auth UX artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: auth-ux-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  lighthouse-mobile-budgets:
    name: Lighthouse mobile budgets
    runs-on: ubuntu-latest
    timeout-minutes: 35
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'
    permissions:
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Determine Lighthouse budget profile
        id: lighthouse_profile
        uses: actions/github-script@v8
        with:
          script: |
            const isMainPush = context.ref === 'refs/heads/main' && context.eventName === 'push'
            const defaultConfig = '.lighthouserc.json'
            const defaultProfile = 'baseline-950'

            if (!isMainPush) {
              core.setOutput('config', defaultConfig)
              core.setOutput('profile', defaultProfile)
              core.setOutput('streak', '0')
              core.notice(`Using ${defaultProfile} for non-main-push run`)
              return
            }

            const response = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              status: 'completed',
              branch: 'main',
              event: 'push',
              per_page: 10,
              exclude_pull_requests: true,
            })

            const priorRuns = (response.data.workflow_runs ?? []).filter(
              (run) => run.id !== context.runId
            )

            let streak = 0
            for (const run of priorRuns) {
              if (run.conclusion === 'success') {
                streak += 1
              } else {
                break
              }
            }

            let config = defaultConfig
            let profile = defaultProfile

            if (streak >= 6) {
              config = '.lighthouserc.tight-800.json'
              profile = 'tight-800'
            } else if (streak >= 3) {
              config = '.lighthouserc.tight-850.json'
              profile = 'tight-850'
            }

            core.setOutput('config', config)
            core.setOutput('profile', profile)
            core.setOutput('streak', String(streak))
            core.notice(`Using ${profile} (${config}) with prior main success streak=${streak}`)

      - name: Run Lighthouse CI mobile budgets (pass 1)
        id: lighthouse_pass_1
        continue-on-error: true
        run: npx lhci autorun --config=${{ steps.lighthouse_profile.outputs.config }}

      - name: Run Lighthouse CI mobile budgets (pass 2 retry)
        id: lighthouse_pass_2
        if: steps.lighthouse_pass_1.outcome == 'failure'
        continue-on-error: true
        run: npx lhci autorun --config=${{ steps.lighthouse_profile.outputs.config }}

      - name: Enforce Lighthouse gate after retry
        if: steps.lighthouse_pass_1.outcome == 'failure' && steps.lighthouse_pass_2.outcome == 'failure'
        run: |
          echo "Lighthouse budgets failed on both pass 1 and pass 2."
          exit 1

      - name: Notify Slack on Lighthouse failure
        if: failure() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          SLACK_UI_ALERTS_WEBHOOK: ${{ secrets.SLACK_UI_ALERTS_WEBHOOK }}
          LIGHTHOUSE_PROFILE: ${{ steps.lighthouse_profile.outputs.profile }}
          GREEN_STREAK: ${{ steps.lighthouse_profile.outputs.streak }}
        run: |
          if [ -z "$SLACK_UI_ALERTS_WEBHOOK" ]; then
            echo "SLACK_UI_ALERTS_WEBHOOK is not set; skipping Slack notification."
            exit 0
          fi

          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BRANCH="${GITHUB_REF_NAME}"
          REPO="${{ github.repository }}"
          EVENT="${{ github.event_name }}"

          payload=$(cat <<'JSON'
          {
            "text": "[CRIT] Lighthouse mobile budgets failed\nRepo: REPO_PLACEHOLDER\nBranch: BRANCH_PLACEHOLDER\nEvent: EVENT_PLACEHOLDER\nRun: RUN_URL_PLACEHOLDER\nBudget profile: PROFILE_PLACEHOLDER\nPrior main green streak: STREAK_PLACEHOLDER\nNext action: Review Lighthouse artifact and fix failing budget(s)."
          }
          JSON
          )

          payload="${payload//REPO_PLACEHOLDER/$REPO}"
          payload="${payload//BRANCH_PLACEHOLDER/$BRANCH}"
          payload="${payload//EVENT_PLACEHOLDER/$EVENT}"
          payload="${payload//RUN_URL_PLACEHOLDER/$RUN_URL}"
          payload="${payload//PROFILE_PLACEHOLDER/$LIGHTHOUSE_PROFILE}"
          payload="${payload//STREAK_PLACEHOLDER/$GREEN_STREAK}"

          curl --fail-with-body -sS -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_UI_ALERTS_WEBHOOK"

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lighthouse-mobile-report
          path: .lighthouseci/
          retention-days: 7

  pre-prod-gate:
    name: Pre-production synthetic gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only gate on main/staging pushes that will trigger a deploy.
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    needs: [predeploy-gates, first-value-synthetic-gate]
    permissions:
      actions: read
      contents: read

    steps:
      - name: Check production synthetic pass rate (last 3 runs)
        id: gate
        uses: actions/github-script@v8
        with:
          script: |
            // Require the last 3 production-synthetics runs to have all passed.
            // This ensures we are not deploying into an already-degraded production.
            const res = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'production-synthetics.yml',
              status: 'completed',
              per_page: 3,
              branch: 'main',
              exclude_pull_requests: true,
            })

            const runs = res.data.workflow_runs ?? []
            if (runs.length === 0) {
              core.notice('No completed production-synthetics runs found — gate is advisory, allowing deploy')
              core.setOutput('gate_pass', 'true')
              return
            }

            const failures = runs.filter(r => r.conclusion === 'failure')
            const summary = runs.map(r => `${r.conclusion}(${r.id})`).join(', ')
            core.notice(`Production synthetics last 3 runs: ${summary}`)

            if (failures.length > 0) {
              const msg = `Pre-prod gate BLOCKED: ${failures.length}/${runs.length} production synthetic runs are failing. ` +
                `Resolve synthetic failures before deploying. Runs: ${summary}`
              core.setOutput('gate_pass', 'false')
              core.setOutput('summary', msg)
              core.setFailed(msg)
            } else {
              core.setOutput('gate_pass', 'true')
              core.notice('Pre-prod gate PASSED: all recent production synthetics are green')
            }

  semgrep:
    name: Semgrep security scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Non-blocking: findings are reviewed manually, not used as a deploy gate.
    continue-on-error: true
    # Run on PRs and main pushes; skip dependabot to avoid noise
    if: github.actor != 'dependabot[bot]'

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Semgrep CLI
        run: python3 -m pip install --upgrade semgrep

      - name: Run Semgrep (custom rules)
        continue-on-error: true
        run: semgrep scan --config .semgrep.yml --quiet

      - name: Upload Semgrep findings to Semgrep Cloud (optional)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
        continue-on-error: true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        run: |
          if [ -z "${SEMGREP_APP_TOKEN:-}" ]; then
            echo "SEMGREP_APP_TOKEN not set in runner environment; skipping Semgrep Cloud upload."
            exit 0
          fi

          python3 -m pip install --upgrade semgrep
          semgrep ci --config auto

  notify-failure:
    name: Notify Slack on failure
    runs-on: ubuntu-latest
    needs: [predeploy-gates, semgrep, playwright, mobile-visual-regression, auth-ux-guard, lighthouse-mobile-budgets, pre-prod-gate]
    if: failure() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')

    steps:
      - name: Determine failed job
        id: failed-job
        run: |
          if [[ "${{ needs.predeploy-gates.result }}" == "failure" ]]; then
            echo "job_name=Predeploy gates (lint, typecheck, build, smoke)" >> $GITHUB_OUTPUT
            echo "job_link=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.pre-prod-gate.result }}" == "failure" ]]; then
            echo "job_name=Pre-production synthetic gate" >> $GITHUB_OUTPUT
            echo "job_link=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.semgrep.result }}" == "failure" ]]; then
            echo "job_name=Semgrep security scan" >> $GITHUB_OUTPUT
            echo "job_link=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.playwright.result }}" == "failure" ]]; then
            echo "job_name=Playwright E2E" >> $GITHUB_OUTPUT
            echo "job_link=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.mobile-visual-regression.result }}" == "failure" ]]; then
            echo "job_name=Mobile visual regression" >> $GITHUB_OUTPUT
            echo "job_link=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.auth-ux-guard.result }}" == "failure" ]]; then
            echo "job_name=Auth UX guard" >> $GITHUB_OUTPUT
            echo "job_link=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.lighthouse-mobile-budgets.result }}" == "failure" ]]; then
            echo "job_name=Lighthouse mobile budgets" >> $GITHUB_OUTPUT
            echo "job_link=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          payload: |
            {
              "text": "❌ CI Build Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ CI Build Failed"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n`${{ github.ref_name }}`"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.actor }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Failed Job:*\n${{ steps.failed-job.outputs.job_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<${{ steps.failed-job.outputs.job_link }}|View full build logs →>"
                  }
                }
              ]
            }

  notify-test-summary:
    name: Post test summary report
    runs-on: ubuntu-latest
    needs: [predeploy-gates, semgrep, playwright, mobile-visual-regression, auth-ux-guard, lighthouse-mobile-budgets, pre-prod-gate]
    if: always()

    steps:
      - name: Build summary message
        id: summary
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PREDEPLOY="${{ needs.predeploy-gates.result }}"
          SEMGREP="${{ needs.semgrep.result }}"
          PLAYWRIGHT="${{ needs.playwright.result }}"
          MOBILE_VISUAL="${{ needs.mobile-visual-regression.result }}"
          AUTH_UX="${{ needs.auth-ux-guard.result }}"
          LIGHTHOUSE="${{ needs.lighthouse-mobile-budgets.result }}"
          PREPROD="${{ needs.pre-prod-gate.result }}"

          STATUS="PASS"
          if [ "$PREDEPLOY" = "failure" ] || [ "$SEMGREP" = "failure" ] || [ "$PLAYWRIGHT" = "failure" ] || [ "$MOBILE_VISUAL" = "failure" ] || [ "$AUTH_UX" = "failure" ] || [ "$LIGHTHOUSE" = "failure" ] || [ "$PREPROD" = "failure" ]; then
            STATUS="FAIL"
          fi

          SUMMARY=$(printf 'CI test summary (%s)\nBranch: %s\nActor: %s\npredeploy-gates: %s\nsemgrep: %s\nplaywright: %s\nmobile-visual-regression: %s\nauth-ux-guard: %s\nlighthouse-mobile-budgets: %s\npre-prod-gate: %s\nRun: %s\n' "$STATUS" "${{ github.ref_name }}" "${{ github.actor }}" "$PREDEPLOY" "$SEMGREP" "$PLAYWRIGHT" "$MOBILE_VISUAL" "$AUTH_UX" "$LIGHTHOUSE" "$PREPROD" "$RUN_URL")

          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "summary<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Evaluate email noise-control policy
        id: email-policy
        if: always()
        uses: actions/github-script@v8
        env:
          CURRENT_STATUS: ${{ steps.summary.outputs.status }}
          FAILURE_STREAK_THRESHOLD: ${{ vars.CI_FAILURE_EMAIL_STREAK_THRESHOLD }}
        with:
          script: |
            const currentStatus = (process.env.CURRENT_STATUS || '').trim().toUpperCase()
            const rawThreshold = Number(process.env.FAILURE_STREAK_THRESHOLD || '3')
            const threshold = Number.isFinite(rawThreshold) && rawThreshold >= 1 ? Math.floor(rawThreshold) : 3

            // Only gate failure notifications. Pass summaries keep existing behavior.
            if (currentStatus !== 'FAIL') {
              core.setOutput('send_email', 'false')
              core.setOutput('failure_streak', '0')
              core.setOutput('threshold', String(threshold))
              core.setOutput('reason', 'Current status is PASS; failure streak policy not applicable')
              return
            }

            const branch = context.ref.replace('refs/heads/', '')
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              branch,
              status: 'completed',
              per_page: 100,
              exclude_pull_requests: true,
            })

            let priorFailures = 0
            for (const run of runs) {
              if (run.id === context.runId) continue

              if (run.conclusion === 'failure') {
                priorFailures += 1
                continue
              }

              // Stop at first non-failure run; streak is consecutive failures only.
              break
            }

            const failureStreak = priorFailures + 1
            const sendEmail = failureStreak >= threshold && (failureStreak === threshold || failureStreak % threshold === 0)

            core.setOutput('send_email', sendEmail ? 'true' : 'false')
            core.setOutput('failure_streak', String(failureStreak))
            core.setOutput('threshold', String(threshold))
            core.setOutput(
              'reason',
              sendEmail
                ? `Sending failure summary at streak ${failureStreak} (threshold ${threshold})`
                : `Suppressing failure summary at streak ${failureStreak}; threshold ${threshold}`
            )

      - name: Log email policy decision
        if: always()
        run: |
          echo "Email policy decision: ${{ steps.email-policy.outputs.reason }}"
          echo "failure_streak=${{ steps.email-policy.outputs.failure_streak }} threshold=${{ steps.email-policy.outputs.threshold }}"

      - name: Post Slack summary
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SUMMARY_TEXT: ${{ steps.summary.outputs.summary }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not configured; skipping Slack summary"
            exit 0
          fi

          payload=$(jq -n --arg text "$SUMMARY_TEXT" '{text:$text}')
          curl -sS -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL"

      - name: Send email summary
        if: always() && (steps.summary.outputs.status == 'PASS' || steps.email-policy.outputs.send_email == 'true')
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_ADDRESS: ${{ secrets.RESEND_FROM_ADDRESS }}
          WEEKLY_AUDIT_EMAIL_TO: ${{ secrets.WEEKLY_AUDIT_EMAIL_TO }}
          SUMMARY_TEXT: ${{ steps.summary.outputs.summary }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "RESEND_API_KEY not configured; skipping email summary"
            exit 0
          fi

          FROM=${RESEND_FROM_ADDRESS:-briefing@startingmonday.app}
          TO=${WEEKLY_AUDIT_EMAIL_TO:-richard@startingmonday.app}
          DATE=$(date -u +"%Y-%m-%d")

          payload=$(jq -n \
            --arg from "$FROM" \
            --arg to "$TO" \
            --arg subject "Starting Monday CI Test Summary - $DATE" \
            --arg text "$SUMMARY_TEXT" \
            '{from:$from,to:[$to],subject:$subject,text:$text}')

          curl -sS -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$payload"
