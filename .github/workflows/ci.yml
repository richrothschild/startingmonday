name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Type check & tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Check for em-dashes
        run: |
          if grep -rP "\xe2\x80\x94" src/; then
            echo "Em-dash (—) found in src/. Use a regular hyphen or reword."
            exit 1
          fi

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    # Gate on a repository variable so this job only runs when secrets are configured.
    # To enable: set PLAYWRIGHT_ENABLED = true in GitHub repo Settings > Variables,
    # then add secrets PLAYWRIGHT_BASE_URL, PLAYWRIGHT_TEST_EMAIL, PLAYWRIGHT_TEST_PASSWORD.
    if: vars.PLAYWRIGHT_ENABLED == 'true'

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
          PLAYWRIGHT_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
          PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  semgrep:
    name: Semgrep security scan
    runs-on: ubuntu-latest
    # Run on PRs and main pushes; skip dependabot to avoid noise
    if: github.actor != 'dependabot[bot]'

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Run Semgrep (custom rules)
        uses: returntocorp/semgrep-action@v1
        with:
          config: .semgrep.yml
        env:
          # Optional: set SEMGREP_APP_TOKEN to also post results to semgrep.dev dashboard
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
