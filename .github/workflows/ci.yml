name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Type check & tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Check for em-dashes
        run: |
          if grep -rP "\xe2\x80\x94" src/; then
            echo "Em-dash (—) found in src/. Use a regular hyphen or reword."
            exit 1
          fi

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    # Staging branch: always runs against the staging URL.
    # Main branch: runs when PLAYWRIGHT_ENABLED = true in repo variables.
    if: github.ref == 'refs/heads/staging' || vars.PLAYWRIGHT_ENABLED == 'true'

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.ref == 'refs/heads/staging' && 'https://starting-monday-staging-production.up.railway.app' || secrets.PLAYWRIGHT_BASE_URL }}
          PLAYWRIGHT_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
          PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  semgrep:
    name: Semgrep security scan
    runs-on: ubuntu-latest
    # Run on PRs and main pushes; skip dependabot to avoid noise
    if: github.actor != 'dependabot[bot]'
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Run Semgrep (custom rules)
        uses: returntocorp/semgrep-action@v1
        with:
          config: .semgrep.yml
        env:
          # Optional: set SEMGREP_APP_TOKEN to also post results to semgrep.dev dashboard
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  notify-failure:
    name: Notify Slack on failure
    runs-on: ubuntu-latest
    needs: [test, semgrep, playwright]
    if: failure() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')

    steps:
      - name: Determine failed job
        id: failed-job
        run: |
          if [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "job_name=Type check & tests" >> $GITHUB_OUTPUT
            echo "job_link=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.semgrep.result }}" == "failure" ]]; then
            echo "job_name=Semgrep security scan" >> $GITHUB_OUTPUT
            echo "job_link=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.playwright.result }}" == "failure" ]]; then
            echo "job_name=Playwright E2E" >> $GITHUB_OUTPUT
            echo "job_link=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          payload: |
            {
              "text": "❌ CI Build Failed",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ CI Build Failed"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n`${{ github.ref_name }}`"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author:*\n${{ github.actor }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Failed Step:*\n${{ steps.failed-job.outputs.job_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit:*\n<${{ github.event.head_commit.url }}|${{ github.event.head_commit.message }}>"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<${{ steps.failed-job.outputs.job_link }}|View full build logs →>"
                  }
                }
              ]
            }
