name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Type check & tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Check for em-dashes
        run: |
          if grep -rP "\xe2\x80\x94" src/; then
            echo "Em-dash (—) found in src/. Use a regular hyphen or reword."
            exit 1
          fi

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    # Non-blocking until staging is healthy. Remove continue-on-error once
    # starting-monday-staging-production.up.railway.app is serving traffic.
    continue-on-error: true
    # Staging branch: always runs against the staging URL.
    # Main branch: runs when PLAYWRIGHT_ENABLED = true in repo variables.
    if: github.ref == 'refs/heads/staging' || vars.PLAYWRIGHT_ENABLED == 'true'

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.ref == 'refs/heads/staging' && 'https://starting-monday-staging-production.up.railway.app' || secrets.PLAYWRIGHT_BASE_URL }}
          PLAYWRIGHT_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
          PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  semgrep:
    name: Semgrep security scan
    runs-on: ubuntu-latest
    # Run on PRs and main pushes; skip dependabot to avoid noise
    if: github.actor != 'dependabot[bot]'

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Run Semgrep (custom rules)
        uses: returntocorp/semgrep-action@v1
        with:
          config: .semgrep.yml
        env:
          # Optional: set SEMGREP_APP_TOKEN to also post results to semgrep.dev dashboard
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
