name: Weekly SLO Report

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  slo-report:
    name: Weekly SLO and Error-Budget Report
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download last 7 days of monitoring summaries
        # Pulls the last 14 monitoring run artifacts (runs every 30 min = ~336 per week)
        # We collect the monitoring-summary.json from each run and cat them together.
        # This is a best-effort log aggregation; for higher fidelity, ship logs to a
        # log aggregator (e.g., Datadog, Loki) and query from there.
        run: |
          echo "Collecting monitoring summary artifacts from recent workflow runs..."
          gh run list \
            --workflow=monitoring.yml \
            --limit=336 \
            --json databaseId,conclusion \
            --jq '.[] | .databaseId' \
          | head -336 > run_ids.txt
          echo "Found $(wc -l < run_ids.txt) recent monitoring runs"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Produce SLO report from monitoring data
        id: slo
        run: |
          # The monitoring summaries report pass/fail at a check level.
          # Convert them to a format the slo-report script can parse.
          #
          # For now, emit a summary from the monitoring artifact data using
          # the check-level pass rates as a proxy for route availability.
          #
          # In production, replace this with a log aggregation query.

          TOTAL=$(wc -l < run_ids.txt | tr -d ' ')
          PASSED=0
          FAILED=0

          while read -r run_id; do
            RESULT=$(gh run view "$run_id" --json conclusion --jq '.conclusion' 2>/dev/null || echo "unknown")
            if [ "$RESULT" = "success" ]; then
              PASSED=$((PASSED + 1))
            elif [ "$RESULT" = "failure" ]; then
              FAILED=$((FAILED + 1))
            fi
          done < run_ids.txt

          PASS_RATE=$(echo "scale=4; $PASSED / $TOTAL * 100" | bc 2>/dev/null || echo "N/A")
          echo "total_runs=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "pass_rate=$PASS_RATE" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish SLO summary to step summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Weekly SLO Report — $(date -u '+%Y-%m-%d')

          ### Synthetic Check Availability Proxy

          | Metric | Value |
          |---|---|
          | Total monitoring runs (7d) | ${{ steps.slo.outputs.total_runs }} |
          | Passed | ${{ steps.slo.outputs.passed }} |
          | Failed | ${{ steps.slo.outputs.failed }} |
          | Pass rate | ${{ steps.slo.outputs.pass_rate }}% |

          ### How to Read This

          Each monitoring run executes all smoke checks against production.
          A failed run indicates at least one P0 check did not pass that window.
          Pass rate >= 99.95% meets P0 SLO proxy target.

          ### Next Step

          For true per-route SLO computation, ship structured \`api_request\` log lines
          from Railway to a log aggregator and run:
          \`\`\`
          npm run slo:report:json < logs.jsonl
          \`\`\`

          See docs/sre/dashboard-setup.md for setup instructions.
          EOF

      - name: Send Slack notification on SLO miss
        if: ${{ steps.slo.outputs.failed > 0 }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          PASS_RATE="${{ steps.slo.outputs.pass_rate }}"
          FAILED="${{ steps.slo.outputs.failed }}"
          TOTAL="${{ steps.slo.outputs.total_runs }}"
          curl -X POST -H 'Content-type: application/json' --data "{
            \"text\": \"Weekly SLO Report: ${FAILED}/${TOTAL} monitoring runs failed (pass rate: ${PASS_RATE}%). Review: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
          }" "$SLACK_WEBHOOK_URL" || true
