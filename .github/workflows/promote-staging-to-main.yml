name: Promote staging to main

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type PROMOTE to continue
        required: true
        type: string
      note:
        description: Optional release note
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  promote:
    name: promote-staging-to-main
    if: ${{ inputs.confirm == 'PROMOTE' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout staging
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: staging

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate guide artifacts
        run: npm run guide:user:sync && npm run guide:internal:sync

      - name: Staging quality gates
        run: |
          npm run gate:standards:staging
          npm run typecheck
          npm run ux:rubric:pages
          npm run test

      - name: Run luxury sentinel on staging (report-only)
        env:
          SENTINEL_BASE_URL: https://starting-monday-staging.up.railway.app
        run: node scripts/luxury-page-sentinel.mjs --report-only --output-json=tmp/luxury-page-sentinel.staging.json

      - name: Enforce staging sentinel contract
        run: |
          node -e "const fs=require('fs');const s=JSON.parse(fs.readFileSync('tmp/luxury-page-sentinel.staging.json','utf8'));const checks=[['coverage.unexplainedGaps',s.coverage?.unexplainedGaps===0,`got ${s.coverage?.unexplainedGaps}`],['availabilityViolations',s.availabilityViolations===0,`got ${s.availabilityViolations}`],['debtRatchet.pass',s.debtRatchet?.pass===true,`got ${s.debtRatchet?.pass}`]];const failed=checks.filter(([,ok])=>!ok);if(failed.length){for(const [name,,detail] of failed){console.error(`staging sentinel contract failed: ${name} (${detail})`);}process.exit(1);}console.log('staging sentinel contract passed');"

      - name: Upload staging sentinel report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: luxury-page-sentinel-staging-${{ github.run_number }}
          path: tmp/luxury-page-sentinel.staging.json
          if-no-files-found: warn
          retention-days: 14

      - name: Open PR from staging to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="Automated promotion from staging to main. Quality gates passed (typecheck, ux:rubric:pages, test, staging sentinel contract)."
          if [ -n "${{ inputs.note }}" ]; then
            BODY="${BODY}\n\nRelease note: ${{ inputs.note }}"
          fi
          gh pr create \
            --title "chore: promote staging to main" \
            --body "${BODY}" \
            --base main \
            --head staging \
            --reviewer richrothschild \
          || echo "A PR from staging to main may already be open — check GitHub."

      - name: Summarize
        if: always()
        run: |
          echo "## Staging Promotion" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source branch: staging" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target branch: main" >> "$GITHUB_STEP_SUMMARY"
          echo "- Triggered by: ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Note: ${{ inputs.note || 'n/a' }}" >> "$GITHUB_STEP_SUMMARY"
