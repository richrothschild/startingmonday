name: Promote staging to main

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type PROMOTE to continue
        required: true
        type: string
      note:
        description: Optional release note
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  promote:
    name: promote-staging-to-main
    if: ${{ inputs.confirm == 'PROMOTE' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout staging
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: staging

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate guide artifacts
        run: npm run guide:user:sync && npm run guide:internal:sync

      - name: Staging quality gates
        run: |
          npm run typecheck
          npm run ux:rubric:pages
          npm run test

      - name: Open PR from staging to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="Automated promotion from staging to main. Quality gates passed (typecheck, ux:rubric:pages, test)."
          if [ -n "${{ inputs.note }}" ]; then
            BODY="${BODY}\n\nRelease note: ${{ inputs.note }}"
          fi
          gh pr create \
            --title "chore: promote staging to main" \
            --body "${BODY}" \
            --base main \
            --head staging \
            --reviewer richrothschild \
          || echo "A PR from staging to main may already be open — check GitHub."

      - name: Summarize
        if: always()
        run: |
          echo "## Staging Promotion" >> "$GITHUB_STEP_SUMMARY"
          echo "- Source branch: staging" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target branch: main" >> "$GITHUB_STEP_SUMMARY"
          echo "- Triggered by: ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Note: ${{ inputs.note || 'n/a' }}" >> "$GITHUB_STEP_SUMMARY"
