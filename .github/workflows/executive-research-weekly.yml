name: Executive Research Weekly Refresh

on:
  schedule:
    - cron: '15 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  executive-research-weekly-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Trigger weekly executive research refresh
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret is required"
            exit 1
          fi

          APP_BASE_URL="https://startingmonday.app"
          URL="${APP_BASE_URL%/}/api/cron/executive-research-refresh?secret=${CRON_SECRET}"
          echo "Calling $URL"
          curl --fail --show-error --silent "$URL" | tee executive-research-refresh.latest.json

      - name: Upload refresh artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: executive-research-refresh
          path: executive-research-refresh.latest.json
          retention-days: 14
