name: EMI Weekly Validation

on:
  schedule:
    - cron: '0 14 * * 5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  weekly-emi-validation:
    name: Run weekly EMI KPI and validation checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Validate required secrets
        env:
          PLAYWRIGHT_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
          PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$PLAYWRIGHT_TEST_EMAIL" ]; then
            echo "Missing required secret: PLAYWRIGHT_TEST_EMAIL"
            exit 1
          fi
          if [ -z "$PLAYWRIGHT_TEST_PASSWORD" ]; then
            echo "Missing required secret: PLAYWRIGHT_TEST_PASSWORD"
            exit 1
          fi
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "Missing required secret: SLACK_WEBHOOK_URL"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run EMI weekly validation gate
        id: emi
        env:
          EMI_SMOKE_BASE_URL: https://startingmonday.app
          EMI_SMOKE_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
          EMI_SMOKE_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}
          EMI_SMOKE_OUTPUT_JSON: '1'
        run: |
          node scripts/emi-postdeploy-smoke.mjs --json > emi-weekly-validation.json

      - name: Publish weekly summary
        if: always()
        run: |
          if [ -f emi-weekly-validation.json ]; then
            node -e "
            const fs = require('fs')
            const data = JSON.parse(fs.readFileSync('emi-weekly-validation.json', 'utf8'))
            const lines = [
              '## EMI Weekly Validation',
              '',
              '| Metric | Value |',
              '|---|---|',
              `| Passed | ${data.passed} |`,
              `| Weekly run id | ${data.weeklyRunId ?? 'n/a'} |`,
              `| Validation run id | ${data.validationRunId ?? 'n/a'} |`,
              `| Validation status | ${data.validationStatus ?? 'n/a'} |`,
              `| mismatchCount | ${String(data.mismatchCount ?? 'n/a')} |`,
              `| nullStreakCount | ${String(data.nullStreakCount ?? 'n/a')} |`,
            ]
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n') + '\n')
            "
          else
            echo "No validation artifact produced" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload EMI weekly artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emi-weekly-validation
          path: emi-weekly-validation.json
          retention-days: 30

      - name: Alert on weekly EMI validation failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -X POST -H 'Content-type: application/json' --data "{
            \"text\": \"🚨 EMI weekly validation failed\",
            \"blocks\": [
              {
                \"type\": \"header\",
                \"text\": { \"type\": \"plain_text\", \"text\": \"🚨 EMI weekly validation failed\" }
              },
              {
                \"type\": \"section\",
                \"text\": {
                  \"type\": \"mrkdwn\",
                  \"text\": \"Mismatch or null-streak regression detected. <${RUN_URL}|View workflow run>.\"
                }
              }
            ]
          }" "$SLACK_WEBHOOK_URL"
