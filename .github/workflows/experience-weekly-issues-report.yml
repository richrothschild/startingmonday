name: Experience Weekly Issues Report

on:
  schedule:
    - cron: '40 13 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  experience-weekly-issues-report:
    name: Generate weekly experience issues report
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - name: Restore portfolio history cache
        id: restore-portfolio-history
        uses: actions/cache/restore@v4
        with:
          path: docs/status/experience-portfolio-rollup.history.json
          key: portfolio-history-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            portfolio-history-${{ github.ref_name }}-

      - name: Restore seeding checklist cache
        id: restore-seeding-checklist
        uses: actions/cache/restore@v4
        with:
          path: |
            docs/status/experience-seeding-checklist.latest.json
            docs/status/experience-seeding-checklist.latest.md
          key: seeding-checklist-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            seeding-checklist-${{ github.ref_name }}-

      - name: Restore probe reset cache
        id: restore-probe-reset
        uses: actions/cache/restore@v4
        with:
          path: |
            docs/status/probe-account-reset.latest.json
            docs/status/probe-account-reset.latest.md
          key: probe-account-reset-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            probe-account-reset-${{ github.ref_name }}-

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Generate and post weekly experience issues report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELIABILITY_SLACK_CHANNEL: reliability---service
          SLACK_RELIABILITY_SERVICE_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node scripts/experience-weekly-issues-report.mjs

      - name: Upload weekly experience artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: experience-weekly-issues-report
          path: |
            docs/status/experience-weekly.latest.json
            docs/status/experience-weekly.latest.md
            docs/status/experience-portfolio-rollup.history.json
            docs/status/experience-seeding-checklist.latest.json
            docs/status/experience-seeding-checklist.latest.md
            docs/status/probe-account-reset.latest.json
            docs/status/probe-account-reset.latest.md
          retention-days: 30

      - name: Save portfolio history cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: docs/status/experience-portfolio-rollup.history.json
          key: portfolio-history-${{ github.ref_name }}-${{ github.run_id }}

      - name: Save seeding checklist cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            docs/status/experience-seeding-checklist.latest.json
            docs/status/experience-seeding-checklist.latest.md
          key: seeding-checklist-${{ github.ref_name }}-${{ github.run_id }}

      - name: Save probe reset cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            docs/status/probe-account-reset.latest.json
            docs/status/probe-account-reset.latest.md
          key: probe-account-reset-${{ github.ref_name }}-${{ github.run_id }}

      - name: Alert on workflow failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "No Slack webhook configured; skipping failure alert."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -X POST -H 'Content-type: application/json' --data '{
            "text": "🚨 Weekly experience issues report workflow failed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Weekly experience issues report workflow failed*\nChannel: reliability---service\n<'"$RUN_URL"'|View workflow run>"
                }
              }
            ]
          }' "$SLACK_WEBHOOK_URL"
