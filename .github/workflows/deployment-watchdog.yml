name: Deployment Watchdog

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  deployments: read

jobs:
  watchdog:
    name: Watch latest main deployment
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Validate monitoring secret
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "Missing required secret: SLACK_WEBHOOK_URL"
            exit 1
          fi

      - name: Check whether the latest main commit has deployed successfully
        id: watchdog
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const branch = 'main'
            const thresholdMinutes = 30
            const runbookUrl = `https://github.com/${owner}/${repo}/blob/main/docs/sre/runbooks/deployment-stalled.md`

            const branchRes = await github.rest.repos.getBranch({ owner, repo, branch })
            const sha = branchRes.data.commit.sha
            const committedAt = new Date(
              branchRes.data.commit.commit.committer?.date ||
              branchRes.data.commit.commit.author?.date ||
              branchRes.data.commit.commit.committer?.date ||
              branchRes.data.commit.commit.author?.date
            )

            const ageMinutes = Math.floor((Date.now() - committedAt.getTime()) / 60000)
            const deploymentsRes = await github.rest.repos.listDeployments({ owner, repo, ref: sha, per_page: 20 })
            const deployments = deploymentsRes.data ?? []

            const states = []
            let hasSuccess = false

            for (const deployment of deployments) {
              const statusRes = await github.rest.repos.listDeploymentStatuses({ owner, repo, deployment_id: deployment.id, per_page: 1 })
              const latestState = statusRes.data?.[0]?.state ?? 'unknown'
              states.push(`${deployment.environment ?? 'unknown'}:${latestState}`)
              if (latestState === 'success') hasSuccess = true
            }

            const shouldAlert = ageMinutes >= thresholdMinutes && !hasSuccess

            core.setOutput('should_alert', shouldAlert ? 'true' : 'false')
            core.setOutput('sha', sha)
            core.setOutput('age_minutes', String(ageMinutes))
            core.setOutput('states', states.join(', '))
            core.setOutput('runbook_url', runbookUrl)

            core.notice(`Deployment watchdog: sha=${sha.slice(0, 8)} age=${ageMinutes}m states=${states.join(', ') || 'none'} success=${hasSuccess}`)

      - name: Alert when latest main commit has not deployed
        if: steps.watchdog.outputs.should_alert == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          SHA="${{ steps.watchdog.outputs.sha }}"
          AGE="${{ steps.watchdog.outputs.age_minutes }}"
          STATES="${{ steps.watchdog.outputs.states }}"
          RUNBOOK_URL="${{ steps.watchdog.outputs.runbook_url }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -X POST -H 'Content-type: application/json' --data "{
            \"text\": \"🚨 Deployment has not completed\",
            \"blocks\": [
              {
                \"type\": \"header\",
                \"text\": { \"type\": \"plain_text\", \"text\": \"🚨 Deployment has not completed\" }
              },
              {
                \"type\": \"section\",
                \"fields\": [
                  {\"type\": \"mrkdwn\", \"text\": \"*Latest main SHA:* <${{ github.server_url }}/${{ github.repository }}/commit/${SHA}|${SHA:0:8}>\"},
                  {\"type\": \"mrkdwn\", \"text\": \"*Age:* ${AGE} minutes\"},
                  {\"type\": \"mrkdwn\", \"text\": \"*States:* ${STATES:-none found}\"},
                  {\"type\": \"mrkdwn\", \"text\": \"*Repository:* ${{ github.repository }}\"}
                ]
              },
              {
                \"type\": \"section\",
                \"text\": {\"type\": \"mrkdwn\", \"text\": \"<${RUNBOOK_URL}|Runbook: deployment stalled> | <${RUN_URL}|View watchdog run>\"}
              }
            ]
          }" "$SLACK_WEBHOOK_URL"
