name: Weekly security audit

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  rls-check:
    name: Supabase RLS coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Check all public tables have RLS enabled
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          response=$(curl -sf -X POST \
            "https://api.supabase.com/v1/projects/mytnhoxcgvnzxhgcumkf/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"SELECT tablename FROM pg_tables WHERE schemaname = '\''public'\'' AND rowsecurity = false ORDER BY tablename"}')
          tables=$(echo "$response" | grep -o '"tablename":"[^"]*"' | cut -d'"' -f4)
          if [[ -n "$tables" ]]; then
            echo "FAIL: These tables are missing RLS:"
            echo "$tables"
            exit 1
          else
            echo "PASS: All public tables have RLS enabled."
          fi

  auth-coverage:
    name: API route auth coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Check all POST/PUT/DELETE routes call an auth guard
        run: |
          failed=0
          # Find all route.ts files under src/app/api/
          while IFS= read -r file; do
            # Skip known intentionally-public routes and routes using custom auth patterns
            case "$file" in
              *webhooks/stripe*|*health*|*demo-brief*|*demo-email*|*partners*|*optimize*|*admin/health*|*notify/new-user*|*auth/verify*) continue ;;
              *briefing/send*) continue ;;  # retired endpoint (returns 410)
              *auth/login-submit*) continue ;;  # login form action: intentionally public, rate-limited via enforcePublicEndpointGuard
              *internal/automation/emi-smoke*) continue ;;  # shared-secret token guard (x-emi-smoke-token)
              *coach-handoff/preview*) continue ;;  # stateless size-capped JSON transform: no DB access, no side effects
            esac
            # Check if file has POST/PUT/DELETE but no auth guard
            # Accepted guards:
            #   requireAuth / requireFeatureAccess / requirePrepAccess - user session guards
            #   createAdminClient / getStaffMember - staff session check (admin/intelligence routes)
            #   requireAutomationAccess - staff automation guard (admin/automation routes, wraps requireStaffAutomationAccess)
            #   auth.getUser - direct Supabase session check with 401 handling (events/onboarding routes)
            if grep -qE 'export async function (POST|PUT|DELETE)' "$file"; then
              if ! grep -qE 'requireAuth|requireFeatureAccess|requirePrepAccess|createAdminClient|getStaffMember|requireAutomationAccess|auth\.getUser' "$file"; then
                echo "MISSING AUTH: $file"
                failed=$((failed + 1))
              fi
            fi
          done < <(find src/app/api -name 'route.ts')
          if [[ $failed -gt 0 ]]; then
            echo "$failed route(s) missing auth guard."
            exit 1
          else
            echo "PASS: All mutation routes have auth guards."
          fi

  migration-sequence:
    name: Migration file sequence check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Verify migration files have no gaps or duplicates
        run: |
          # Duplicate numbers that already shipped to production via parallel
          # merges. They are grandfathered as-is: renumbering applied migrations
          # would desync the files from Supabase's migration history.
          GRANDFATHERED_DUPLICATES=" 107 109 120 129 130 131 132 158 "
          # Legacy pre-numbering migrations, applied to production before the
          # NNN_ convention existed.
          GRANDFATHERED_UNNUMBERED=" create-notifications-table.sql create-warn-notification-rpc.sql "
          failed=0
          prev=-1
          prev_name=""
          while IFS= read -r f; do
            name=$(basename "$f")
            raw_num=$(echo "$name" | grep -oE '^[0-9]+' || true)
            if [[ -z "$raw_num" ]]; then
              if [[ "$GRANDFATHERED_UNNUMBERED" != *" $name "* ]]; then
                echo "UNNUMBERED: $name does not follow the NNN_description.sql convention"
                failed=$((failed + 1))
              fi
              continue
            fi
            num=$((10#$raw_num))
            if [[ $prev -ge 0 ]]; then
              if [[ $num -eq $prev ]]; then
                if [[ "$GRANDFATHERED_DUPLICATES" != *" $num "* ]]; then
                  echo "DUPLICATE: $name shares number $num with $prev_name"
                  failed=$((failed + 1))
                fi
              elif [[ $num -ne $((prev + 1)) ]]; then
                echo "GAP: $prev_name -> $name (missing $((prev + 1))..$((num - 1)))"
                failed=$((failed + 1))
              fi
            fi
            prev=$num
            prev_name=$name
          done < <(ls supabase/migrations/*.sql | sort)
          if [[ $failed -gt 0 ]]; then
            exit 1
          else
            echo "PASS: Migration sequence is clean through $(printf '%03d' $prev) (grandfathered duplicates:$GRANDFATHERED_DUPLICATES)."
          fi
