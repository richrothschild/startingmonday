name: Nightly Outreach Audit

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  outreach-audit:
    name: Outreach Format and DB Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Outreach CSV and DB audit
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/nightly-outreach-audit.mjs
