name: Trust Daily Report

on:
  schedule:
    - cron: '40 13 * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  trust-daily-report:
    name: Build trust daily report
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate trust daily report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_RELIABILITY_SERVICE_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RELIABILITY_SLACK_CHANNEL: reliability---service
        run: node scripts/trust-daily-report.mjs

      - name: Upload trust daily report artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: trust-daily-latest
          path: |
            docs/status/trust-daily.latest.json
            docs/status/trust-daily.latest.md
          retention-days: 14

      - name: Alert when trust daily report fails
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "No Slack webhook configured; skipping failure alert."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -X POST -H 'Content-type: application/json' --data '{
            "text": "🚨 Trust daily report failed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Trust daily report failed*\nChannel: reliability---service\n<'"$RUN_URL"'|View workflow run>"
                }
              }
            ]
          }' "$SLACK_WEBHOOK_URL"
