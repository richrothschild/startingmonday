name: Cognitive Load Agent

on:
  schedule:
    - cron: '10 14 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  cognitive-load-agent:
    name: Score public-route cognitive load
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run cognitive load agent
        env:
          RELIABILITY_SLACK_CHANNEL: reliability---service
          SLACK_RELIABILITY_SERVICE_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node scripts/cognitive-load-agent.mjs

      - name: Upload cognitive load artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: cognitive-load-latest
          path: |
            docs/status/cognitive-load.latest.json
            docs/status/cognitive-load.latest.md
          retention-days: 14

      - name: Alert when cognitive load workflow fails
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "No Slack webhook configured; skipping failure alert."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -X POST -H 'Content-type: application/json' --data '{
            "text": "🚨 Cognitive load agent failed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Cognitive load agent failed*\nChannel: reliability---service\n<'"$RUN_URL"'|View workflow run>"
                }
              }
            ]
          }' "$SLACK_WEBHOOK_URL"
