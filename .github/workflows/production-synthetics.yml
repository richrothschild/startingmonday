name: Production Synthetics

# Runs all 8 synthetic checks against production every 5 minutes.
# Sends Sev-1 Slack alert on P0 synthetic failure with deploy SHA and runbook link.
# Complements monitoring.yml (smoke checks) with deeper lifecycle validation.

on:
  schedule:
    # Staggered from monitoring.yml (*/30) and fast-burn-alert.yml (10,40)
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: false
        default: production

permissions:
  actions: read
  contents: read

jobs:
  synthetics:
    name: Run P0 synthetic checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Validate Synthetic-10 credentials
        env:
          PLAYWRIGHT_SYNTH_SIGNUP_EMAIL: ${{ secrets.PLAYWRIGHT_SYNTH_SIGNUP_EMAIL }}
          PLAYWRIGHT_SYNTH_SIGNUP_PASSWORD: ${{ secrets.PLAYWRIGHT_SYNTH_SIGNUP_PASSWORD }}
        run: |
          if [ -z "$PLAYWRIGHT_SYNTH_SIGNUP_EMAIL" ] || [ -z "$PLAYWRIGHT_SYNTH_SIGNUP_PASSWORD" ]; then
            echo "Missing Synthetic-10 credentials. Configure PLAYWRIGHT_SYNTH_SIGNUP_EMAIL and PLAYWRIGHT_SYNTH_SIGNUP_PASSWORD secrets."
            exit 1
          fi

      - name: Validate onboarding live probe credentials
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Missing onboarding-live credentials. Configure NEXT_PUBLIC_SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY secrets."
            exit 1
          fi

      - name: Run synthetic tests
        id: synthetics
        env:
          PLAYWRIGHT_BASE_URL: https://startingmonday.app
          PLAYWRIGHT_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
          PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}
          PLAYWRIGHT_SYNTH_SIGNUP_EMAIL: ${{ secrets.PLAYWRIGHT_SYNTH_SIGNUP_EMAIL }}
          PLAYWRIGHT_SYNTH_SIGNUP_PASSWORD: ${{ secrets.PLAYWRIGHT_SYNTH_SIGNUP_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SYNTH_BRIEFING_SAMPLE_COUNT: 5
          SYNTH_BRIEFING_SETTLE_P50_MS: 7000
          SYNTH_BRIEFING_SETTLE_P95_MS: 14000
          SYNTH_JOURNEY_STEP_P95_WARN_MS: 6000
          SYNTH_JOURNEY_STEP_P95_CRITICAL_MS: 12000
        run: |
          npx playwright test --project=synthetics --project=onboarding-live \
            --reporter=json 2>/dev/null > synthetic-results.json || true

          # Parse results for step summary and alert
          node -e "
          const fs = require('fs')
          const results = JSON.parse(fs.readFileSync('synthetic-results.json', 'utf8'))
          const suites = results.suites ?? []
          let passed = 0, failed = 0, skipped = 0
          const failedTests = []
          const stepDurations = new Map()

          function percentile(values, p) {
            if (!Array.isArray(values) || values.length === 0) return null
            const sorted = [...values].sort((a, b) => a - b)
            const idx = Math.min(sorted.length - 1, Math.max(0, Math.ceil((p / 100) * sorted.length) - 1))
            return sorted[idx]
          }

          function walk(suite) {
            for (const s of suite.suites ?? []) walk(s)
            for (const spec of suite.specs ?? []) {
              for (const test of spec.tests ?? []) {
                if (test.status === 'passed') passed++
                else if (test.status === 'skipped') skipped++
                else { failed++; failedTests.push(spec.title) }

                const durations = (test.results ?? [])
                  .map((result) => Number(result.duration))
                  .filter((duration) => Number.isFinite(duration) && duration >= 0)
                if (durations.length > 0) {
                  const lastDuration = durations[durations.length - 1]
                  const existing = stepDurations.get(spec.title) ?? []
                  existing.push(lastDuration)
                  stepDurations.set(spec.title, existing)
                }
              }
            }
          }
          suites.forEach(walk)

          const total = passed + failed
          const warnP95Ms = Number(process.env.SYNTH_JOURNEY_STEP_P95_WARN_MS || 6000)
          const criticalP95Ms = Number(process.env.SYNTH_JOURNEY_STEP_P95_CRITICAL_MS || 12000)

          const perStepMetrics = Array.from(stepDurations.entries())
            .map(([stepName, values]) => {
              const p50 = percentile(values, 50)
              const p95 = percentile(values, 95)
              return {
                stepName,
                sampleCount: values.length,
                p50Ms: p50 === null ? null : Math.round(p50),
                p95Ms: p95 === null ? null : Math.round(p95),
              }
            })
            .filter((step) => typeof step.p95Ms === 'number')
            .sort((a, b) => b.p95Ms - a.p95Ms)

          const journeyStepP95 =
            perStepMetrics.length > 0
              ? Math.round(percentile(perStepMetrics.map((step) => step.p95Ms), 95))
              : null
          const slowStepCount = perStepMetrics.filter((step) => step.p95Ms >= warnP95Ms).length
          const criticalSlowStepCount = perStepMetrics.filter((step) => step.p95Ms >= criticalP95Ms).length

          const failureRatio = total > 0 ? failed / total : 0
          const slowStepRatio = perStepMetrics.length > 0 ? slowStepCount / perStepMetrics.length : 0
          const criticalSlowStepRatio =
            perStepMetrics.length > 0 ? criticalSlowStepCount / perStepMetrics.length : 0
          const abandonmentRiskScore = Math.max(
            0,
            Math.min(
              100,
              Math.round(failureRatio * 70 + slowStepRatio * 20 + criticalSlowStepRatio * 10)
            )
          )
          const abandonmentRiskBand =
            abandonmentRiskScore >= 40 ? 'high' : abandonmentRiskScore >= 20 ? 'medium' : 'low'

          fs.writeFileSync(
            'synthetic-journey-metrics.json',
            JSON.stringify(
              {
                generatedAt: new Date().toISOString(),
                totalChecks: total,
                failedChecks: failed,
                journeyStepP95Ms: journeyStepP95,
                abandonmentRisk: {
                  score: abandonmentRiskScore,
                  band: abandonmentRiskBand,
                  weights: {
                    failureRatio: 70,
                    slowStepRatio: 20,
                    criticalSlowStepRatio: 10,
                  },
                },
                thresholds: {
                  warnStepP95Ms: warnP95Ms,
                  criticalStepP95Ms: criticalP95Ms,
                },
                slowStepCount,
                criticalSlowStepCount,
                perStepTop: perStepMetrics.slice(0, 12),
              },
              null,
              2
            )
          )

          console.log('passed=' + passed)
          console.log('failed=' + failed)
          console.log('skipped=' + skipped)
          console.log('total=' + total)
          console.log('failed_tests=' + failedTests.join('|'))
          console.log('journey_step_p95=' + (journeyStepP95 ?? ''))
          console.log('journey_risk_score=' + abandonmentRiskScore)
          console.log('journey_risk_band=' + abandonmentRiskBand)
          console.log('journey_slow_steps=' + slowStepCount)
          console.log('journey_critical_slow_steps=' + criticalSlowStepCount)

          const outputs = [
            'passed=' + passed,
            'failed=' + failed,
            'skipped=' + skipped,
            'total=' + total,
            'failed_tests=' + failedTests.join('|'),
            'journey_step_p95=' + String(journeyStepP95 ?? ''),
            'journey_risk_score=' + String(abandonmentRiskScore),
            'journey_risk_band=' + abandonmentRiskBand,
            'journey_slow_steps=' + String(slowStepCount),
            'journey_critical_slow_steps=' + String(criticalSlowStepCount),
          ]

          const briefingMetricsPath = 'synthetic-briefing-settle-metrics.json'
          if (fs.existsSync(briefingMetricsPath)) {
            try {
              const briefingMetrics = JSON.parse(fs.readFileSync(briefingMetricsPath, 'utf8'))
              outputs.push('briefing_settle_p50=' + String(briefingMetrics.p50Ms ?? ''))
              outputs.push('briefing_settle_p95=' + String(briefingMetrics.p95Ms ?? ''))
              outputs.push('briefing_settle_samples=' + String(briefingMetrics.sampleCount ?? ''))
            } catch {
              outputs.push('briefing_settle_p50=')
              outputs.push('briefing_settle_p95=')
              outputs.push('briefing_settle_samples=')
            }
          } else {
            outputs.push('briefing_settle_p50=')
            outputs.push('briefing_settle_p95=')
            outputs.push('briefing_settle_samples=')
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, outputs.join('\n') + '\n')
          " 2>/dev/null || echo "Result parsing failed — using exit code" >> /dev/null

      - name: Publish synthetic summary
        if: always()
        run: |
          PASSED="${{ steps.synthetics.outputs.passed || 'N/A' }}"
          FAILED="${{ steps.synthetics.outputs.failed || 'N/A' }}"
          TOTAL="${{ steps.synthetics.outputs.total || 'N/A' }}"
          FAILED_TESTS="${{ steps.synthetics.outputs.failed_tests || '' }}"
          BRIEFING_P50="${{ steps.synthetics.outputs.briefing_settle_p50 || 'N/A' }}"
          BRIEFING_P95="${{ steps.synthetics.outputs.briefing_settle_p95 || 'N/A' }}"
          BRIEFING_SAMPLES="${{ steps.synthetics.outputs.briefing_settle_samples || 'N/A' }}"
          JOURNEY_STEP_P95="${{ steps.synthetics.outputs.journey_step_p95 || 'N/A' }}"
          JOURNEY_RISK_SCORE="${{ steps.synthetics.outputs.journey_risk_score || 'N/A' }}"
          JOURNEY_RISK_BAND="${{ steps.synthetics.outputs.journey_risk_band || 'N/A' }}"
          JOURNEY_SLOW_STEPS="${{ steps.synthetics.outputs.journey_slow_steps || 'N/A' }}"
          JOURNEY_CRITICAL_SLOW_STEPS="${{ steps.synthetics.outputs.journey_critical_slow_steps || 'N/A' }}"
          SHA="${{ github.sha }}"

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Production Synthetics — $(date -u '+%Y-%m-%d %H:%M UTC')

          | Metric | Value |
          |---|---|
          | Passed | ${PASSED} |
          | Failed | ${FAILED} |
          | Total | ${TOTAL} |
          | Briefing settle P50 (ms) | ${BRIEFING_P50} |
          | Briefing settle P95 (ms) | ${BRIEFING_P95} |
          | Briefing settle samples | ${BRIEFING_SAMPLES} |
          | Journey step P95 (ms) | ${JOURNEY_STEP_P95} |
          | Journey abandonment risk | ${JOURNEY_RISK_SCORE}/100 (${JOURNEY_RISK_BAND}) |
          | Slow journey steps | ${JOURNEY_SLOW_STEPS} |
          | Critical-slow steps | ${JOURNEY_CRITICAL_SLOW_STEPS} |
          | Deploy SHA | ${SHA:0:8} |

          EOF

          if [ -n "$FAILED_TESTS" ]; then
            echo "### Failed Checks" >> "$GITHUB_STEP_SUMMARY"
            echo "$FAILED_TESTS" | tr '|' '\n' | sed 's/^/- /' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload synthetic results artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: synthetic-results
          path: |
            synthetic-results.json
            synthetic-briefing-settle-metrics.json
            synthetic-journey-metrics.json
          retention-days: 14

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: synthetics-playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Send Sev-1 alert on P0 synthetic failure
        if: ${{ steps.synthetics.outputs.failed > 0 }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          FAILED="${{ steps.synthetics.outputs.failed }}"
          TOTAL="${{ steps.synthetics.outputs.total }}"
          FAILED_TESTS="${{ steps.synthetics.outputs.failed_tests }}"
          BRIEFING_P50="${{ steps.synthetics.outputs.briefing_settle_p50 || 'n/a' }}"
          BRIEFING_P95="${{ steps.synthetics.outputs.briefing_settle_p95 || 'n/a' }}"
          JOURNEY_RISK_SCORE="${{ steps.synthetics.outputs.journey_risk_score || 'n/a' }}"
          JOURNEY_RISK_BAND="${{ steps.synthetics.outputs.journey_risk_band || 'n/a' }}"
          SHA="${{ github.sha }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Format failed test list for Slack
          TESTS_FMT=$(echo "$FAILED_TESTS" | tr '|' '\n' | head -5 | sed 's/^/- /' | tr '\n' ' ')
          TESTS_FMT=${TESTS_FMT//\\/\\\\}
          TESTS_FMT=${TESTS_FMT//\"/\\\"}

          cat > slack-payload.json <<EOF
          {
            "text": "P0 Synthetic failure - ${FAILED}/${TOTAL} checks failed",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "P0 Synthetic Failure - Sev-1"
                }
              },
              {
                "type": "section",
                "fields": [
                  {"type": "mrkdwn", "text": "*Failed checks:* ${FAILED}/${TOTAL}"},
                  {"type": "mrkdwn", "text": "*Deploy SHA:* ${SHA:0:8}"},
                  {"type": "mrkdwn", "text": "*Briefing settle:* P50 ${BRIEFING_P50}ms | P95 ${BRIEFING_P95}ms"},
                  {"type": "mrkdwn", "text": "*Journey risk:* ${JOURNEY_RISK_SCORE}/100 (${JOURNEY_RISK_BAND})"},
                  {"type": "mrkdwn", "text": "*Tests:* ${TESTS_FMT}"},
                  {"type": "mrkdwn", "text": "*Runbooks:* docs/sre/runbooks/"}
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "<${RUN_URL}|View synthetic run logs>"
                }
              }
            ]
          }
          EOF

          curl -X POST -H 'Content-type: application/json' --data @slack-payload.json "$SLACK_WEBHOOK_URL"
