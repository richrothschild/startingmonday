name: Experience Vitals Agent

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  experience-vitals-agent:
    name: Measure route-tier experience vitals
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Refresh route inventory snapshot
        env:
          RELIABILITY_SLACK_CHANNEL: reliability---service
          SLACK_RELIABILITY_SERVICE_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: node scripts/experience-route-inventory.mjs

      - name: Run experience vitals agent
        env:
          PLAYWRIGHT_BASE_URL: https://startingmonday.app
          PLAYWRIGHT_TEST_EMAIL: ${{ secrets.PLAYWRIGHT_TEST_EMAIL }}
          PLAYWRIGHT_TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_TEST_PASSWORD }}
          SLACK_UI_DELIVERY_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_UI_DELIVERY_CHANNEL: reliability---service
        run: |
          node scripts/experience-vitals-agent.mjs \
            --base-url "$PLAYWRIGHT_BASE_URL" \
            --inventory docs/status/route-inventory.latest.json \
            --baseline config/experience-vitals-baseline.json \
            --report docs/status/experience-vitals.latest.json

      - name: Upload experience vitals artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: experience-vitals-latest
          path: |
            docs/status/route-inventory.latest.json
            docs/status/route-inventory.latest.md
            docs/status/experience-vitals.latest.json
            docs/status/experience-vitals.latest.md
          retention-days: 14

      - name: Alert when vitals workflow fails
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "No Slack webhook configured; skipping failure alert."
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -X POST -H 'Content-type: application/json' --data '{
            "text": "🚨 Experience vitals agent failed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Experience vitals agent failed*\nChannel: reliability---service\n<'"$RUN_URL"'|View workflow run>"
                }
              }
            ]
          }' "$SLACK_WEBHOOK_URL"
